name: Atualizador de Dados

on:
  schedule:
    - cron: '0 12,16,20,23,02 * * *' # Horários PizzattoLog
  workflow_dispatch: # Permite rodar manualmente

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do código
        uses: actions/checkout@v3

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Instalar Dependências
        run: pip install requests # ESSA LINHA É OBRIGATÓRIA

      - name: Executar Robô
        run: python robo.py

      - name: Salvar Mudanças
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add transacoes.json
          git commit -m "Dados atualizados automaticamente" || echo "Sem mudanças"
          git push
