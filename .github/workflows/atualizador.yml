name: Atualizador de Dados

on:
  schedule:
    - cron: '0 12,16,20,23,02 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 👈 Importante: Permite gravar no repositório
      
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4
        with:
          persist-credentials: true # 👈 Mantém a senha ativa

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar Dependências
        run: pip install requests pandas

      - name: Executar Robô
        run: python robo.py

      # 🚀 O PULO DO GATO: Usar uma ferramenta pronta para salvar
      - name: Salvar Mudanças no JSON
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Dados atualizados automaticamente [Skip CI]"
          file_pattern: 'transacoes.json' # Foca apenas no arquivo de dados
          push_options: '--force' # Força o envio se necessário
