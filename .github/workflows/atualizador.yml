name: Atualizador de Dados

on:
  schedule:
    - cron: '0 12,16,20,23,02 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Puxa todo o histórico para não dar erro de conflito

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar Dependências
        run: pip install requests

      - name: Executar Robô
        run: python robo.py

      - name: Salvar Mudanças
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          
          # 🚨 O SEGREDO: Puxa o que está no GitHub antes de salvar
          git pull origin main --rebase 
          
          git add transacoes.json
          git commit -m "Dados atualizados automaticamente" || echo "Sem mudanças para salvar"
          git push origin main
