<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BI | Gestão de Abastecimento | PizzattoLog</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@700&family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/choices.js/public/assets/styles/choices.min.css" />
<script src="https://cdn.jsdelivr.net/npm/choices.js/public/assets/scripts/choices.min.js"></script>

<style>
    :root {
        --bg-main: #0b0f19; --bg-card: #111827; --bg-input: #1e293b; 
        --pizzatto-red: #dc2626; --pizzatto-orange: #f97316; 
        --text-primary: #f8fafc; --text-secondary: #94a3b8;
        --border: #334155; --success: #10b981; --danger: #f87171;
    }

    body { font-family: 'Inter', sans-serif; margin: 0; background: var(--bg-main); color: var(--text-primary); overflow-x: hidden; }
    .container { padding: 20px; max-width: 1600px; margin: auto; }

    /* LOGIN PREMIUM */
    #tela-login { position: fixed; inset: 0; background: var(--bg-main); display: flex; align-items: center; justify-content: center; z-index: 99999; }
    .login-box { background: var(--bg-card); padding: 40px; border-radius: 16px; border: 1px solid var(--border); text-align: center; width: 100%; max-width: 400px; position: relative; }
    .login-logo { background: white; padding: 15px 25px; border-radius: 12px; display: inline-block; margin-bottom: 25px; }
    .login-box input { width: 100%; padding: 14px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg-input); color: white; margin-bottom: 15px; text-align: center; box-sizing: border-box; }
    .login-box button { width: 100%; background: var(--pizzatto-red); color: white; border: none; padding: 14px; border-radius: 8px; font-weight: bold; cursor: pointer; }

    /* HEADER */
    header { background: var(--bg-card); padding: 25px; border-radius: 12px; margin-bottom: 25px; display: flex; align-items: center; border: 1px solid var(--border); }
    .logo-container { background: white; padding: 10px 20px; border-radius: 10px; margin-right: 20px; }
    .icon-bomba { color: var(--pizzatto-orange); width: 32px; height: 32px; vertical-align: middle; margin-right: 10px; }

    /* DASHBOARD */
    .kpis { display: flex; gap: 15px; margin-bottom: 20px; flex-wrap: wrap; }
    .kpi { background: var(--bg-card); padding: 20px; border-radius: 12px; flex: 1; min-width: 200px; border: 1px solid var(--border); border-left: 5px solid var(--pizzatto-orange); }
    .kpi label { font-size: 11px; color: var(--text-secondary); text-transform: uppercase; font-weight: 700; }
    .kpi span { font-size: 24px; font-weight: 800; display: block; margin-top: 5px; }

    .filtros { display: flex; flex-wrap: wrap; gap: 15px; background: var(--bg-card); padding: 20px; border-radius: 12px; margin-bottom: 20px; border: 1px solid var(--border); }
    .filtro-box { flex: 1; min-width: 140px; }
    input[type="date"], input[list] { height: 38px; width: 100%; padding: 0 14px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg-input); color: white; box-sizing: border-box; }

    .table-container { overflow-x: auto; background: var(--bg-card); border-radius: 12px; border: 1px solid var(--border); }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th, td { padding: 12px 15px; border-bottom: 1px solid var(--border); text-align: left; }
    th { background: #1e293b; color: #94a3b8; text-transform: uppercase; font-size: 11px; }
    .num { text-align: right; font-family: monospace; font-size: 14px; }
    .btn-excel { background: var(--success); color: white; border: none; padding: 0 20px; height: 38px; border-radius: 8px; font-weight: 600; cursor: pointer; margin-left: auto; }
</style>
</head>
<body>

<div id="tela-login">
    <div class="login-box">
        <div class="login-logo"><img src="logo.png" style="height:50px;" onerror="this.style.display='none'"></div>
        <h2>Acesso PizzattoLog</h2>
        <input type="password" id="inputSenha" placeholder="Senha">
        <button onclick="logar()">Acessar Painel</button>
    </div>
</div>

<div class="container" id="app" style="display: none;">
    <header>
        <div class="logo-container"><img src="logo.png" style="height:40px;" onerror="this.style.display='none'"></div>
        <div>
            <h1 style="margin:0;"><i data-lucide="fuel" class="icon-bomba"></i>BI Painel de Abastecimento</h1>
            <small style="color:var(--text-secondary)">Monitoramento Ticket Log | v2026</small>
        </div>
        <button class="btn-excel" onclick="baixarExcel()">Exportar Excel</button>
    </header>

    <div class="filtros">
        <div class="filtro-box"><input id="fPlaca" list="lPlacas" placeholder="🚗 Placa..."></div>
        <div class="filtro-box"><input id="fCidade" list="lCidades" placeholder="🏙️ Cidade..."></div>
        <div class="filtro-box"><input type="date" id="fD1"></div>
        <div class="filtro-box"><input type="date" id="fD2"></div>
        <div class="filtro-box"><select id="fPosto" multiple></select></div>
    </div>

    <div class="kpis">
        <div class="kpi"><label>Total Investido</label><span id="kTotal">R$ 0,00</span></div>
        <div class="kpi"><label>Litros Totais</label><span id="kLitros">0,00 L</span></div>
        <div class="kpi"><label>Média Preço/L</label><span id="kMedia">R$ 0,00</span></div>
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>Data/Hora</th>
                    <th>Placa</th>
                    <th>Posto</th>
                    <th>Cidade</th>
                    <th>UF</th>
                    <th>Produto</th>
                    <th class="num">Litros</th>
                    <th class="num">Total</th>
                    <th class="num">Preço/L</th>
                </tr>
            </thead>
            <tbody id="tabela"></tbody>
        </table>
    </div>
</div>

<datalist id="lPlacas"></datalist>
<datalist id="lCidades"></datalist>

<script>
    lucide.createIcons();
    let dados = []; let choices;

    function logar() {
        // SUA SENHA DO LAYOUT TOP
        if(document.getElementById('inputSenha').value === 'Pizzatto_&3gm5zQ742i') {
            document.getElementById('tela-login').style.display = 'none';
            document.getElementById('app').style.display = 'block';
            carregar();
        } else { alert("Senha incorreta"); }
    }

    function carregar() {
        fetch('transacoes.json?v=' + Date.now()).then(r => r.json()).then(j => {
            dados = j.sort((a,b) => new Date(b.dataTransacao) - new Date(a.dataTransacao));
            preencherFiltros();
            filtrar();
        });
    }

    function preencherFiltros() {
        const pks = new Set(), cds = new Set(), pts = new Set();
        dados.forEach(i => { pks.add(i.placa); cds.add(i.nomeCidade); pts.add(i.nomeReduzidoEstabelecimento); });
        
        const lp = document.getElementById('lPlacas'); pks.forEach(p => lp.innerHTML += `<option value="${p}">`);
        const lc = document.getElementById('lCidades'); cds.forEach(c => lc.innerHTML += `<option value="${c}">`);
        
        const sp = document.getElementById('fPosto');
        Array.from(pts).sort().forEach(p => sp.innerHTML += `<option value="${p}">${p}</option>`);
        choices = new Choices(sp, { removeItemButton: true, placeholderValue: 'Filtrar Postos' });

        ['fPlaca', 'fCidade', 'fD1', 'fD2'].forEach(id => document.getElementById(id).addEventListener('input', filtrar));
        sp.addEventListener('change', filtrar);
    }

    function filtrar() {
        const placa = document.getElementById('fPlaca').value.toUpperCase();
        const cidade = document.getElementById('fCidade').value.toUpperCase();
        const d1 = document.getElementById('fD1').value;
        const d2 = document.getElementById('fD2').value;
        const selP = choices.getValue(true);

        const filtrados = dados.filter(i => {
            let ok = true;
            if(placa && !i.placa.includes(placa)) ok = false;
            if(cidade && !(i.nomeCidade||'').toUpperCase().includes(cidade)) ok = false;
            if(selP.length && !selP.includes(i.nomeReduzidoEstabelecimento)) ok = false;
            if(i.dataTransacao) {
                const d = i.dataTransacao.split('T')[0];
                if(d1 && d < d1) ok = false;
                if(d2 && d > d2) ok = false;
            }
            return ok;
        });

        renderizar(filtrados);
    }

    function renderizar(lista) {
        const body = document.getElementById('tabela'); body.innerHTML = '';
        let vT = 0, lT = 0;

        lista.forEach(i => {
            vT += i.valorTransacao; lT += i.litros;
            const dt = new Date(i.dataTransacao);
            body.innerHTML += `<tr>
                <td>${dt.toLocaleDateString('pt-BR')} ${dt.toLocaleTimeString('pt-BR', {hour:'2-digit', minute:'2-digit'})}</td>
                <td><b>${i.placa}</b></td>
                <td>${i.nomeReduzidoEstabelecimento}</td>
                <td>${i.nomeCidade || '-'}</td>
                <td>${i.uf}</td>
                <td>${i.tipoCombustivel}</td>
                <td class="num">${i.litros.toLocaleString('pt-BR', {minimumFractionDigits:2})}</td>
                <td class="num">R$ ${i.valorTransacao.toLocaleString('pt-BR', {minimumFractionDigits:2})}</td>
                <td class="num">R$ ${i.valorLitro.toLocaleString('pt-BR', {minimumFractionDigits:2})}</td>
            </tr>`;
        });

        document.getElementById('kTotal').innerText = "R$ " + vT.toLocaleString('pt-BR', {minimumFractionDigits:2});
        document.getElementById('kLitros').innerText = lT.toLocaleString('pt-BR', {minimumFractionDigits:2}) + " L";
        document.getElementById('kMedia').innerText = "R$ " + (vT/lT || 0).toLocaleString('pt-BR', {minimumFractionDigits:2});
    }

    function baixarExcel() {
        let csv = "\ufeffDATA;PLACA;POSTO;CIDADE;UF;PRODUTO;LITROS;TOTAL\n";
        dados.forEach(i => {
            csv += `${i.dataTransacao};${i.placa};${i.nomeReduzidoEstabelecimento};${i.nomeCidade};${i.uf};${i.tipoCombustivel};${i.litros};${i.valorTransacao}\n`;
        });
        const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
        const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'PizzattoLog.csv'; a.click();
    }
</script>
</body>
</html>
