<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BI | Gestão de Abastecimento | PizzattoLog</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@700&family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
    /* --- CONFIGURAÇÕES GERAIS --- */
    :root {
        --bg-main: #0b0f19;
        --bg-card: #111827;
        --pizzatto-red: #dc2626; /* Vermelho da Logo */
        --pizzatto-orange: #f97316; /* Laranja da Logo */
        --text-primary: #f8fafc;
        --text-secondary: #94a3b8;
        --border: #1f2937;
        --success: #4ade80;
        --danger: #f87171;
    }

    body { font-family: 'Inter', sans-serif; margin: 0; background: var(--bg-main); color: var(--text-primary); overflow-x: hidden; }
    .container { padding: 20px; max-width: 1600px; margin: auto; }
    h1, h2, h3 { font-family: 'Poppins', sans-serif; }

    /* --- CABEÇALHO PROFISSIONAL --- */
    header {
        background: var(--bg-card);
        padding: 25px;
        border-radius: 12px;
        margin-bottom: 25px;
        display: flex;
        justify-content: center;
        align-items: center;
        border: 1px solid var(--border);
        box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
        position: relative;
        overflow: hidden;
    }

    /* Brilho de Fundo Laranja Sutil */
    header::after {
        content: "";
        position: absolute;
        left: -50%; top: -100%;
        width: 200%; height: 200%;
        background: radial-gradient(circle, rgba(249,115,22,0.06) 0%, rgba(255,255,255,0) 70%);
        pointer-events: none;
    }

    .cabecalho-conteudo { display: flex; align-items: center; gap: 25px; z-index: 1; }

    /* 🔹 SOLUÇÃO PONTO 1: Container Branco para Logo PizzattoLog se destacar */
    .logo-container {
        background: white;
        padding: 10px 20px;
        border-radius: 10px;
        border: 1px solid var(--border);
        box-shadow: 0 4px 15px rgba(249, 115, 22, 0.2);
    }
    .logo-relatorio {
        height: 60px; /* Tamanho ideal para não distorcer */
        width: auto;
    }

    .cabecalho-titulos { display: flex; flex-direction: column; }
    .cabecalho-titulos h1 {
        font-size: 30px;
        font-weight: 700;
        margin: 0;
        color: var(--text-primary);
        letter-spacing: -0.5px;
        display: flex;
        align-items: center;
        gap: 12px;
    }

    /* Ícone de Bomba Laranja */
    .icon-bomba { color: var(--pizzatto-orange); width: 32px; height: 32px; }
    .bi-destaque { color: var(--pizzatto-red); font-weight: 800; }

    .cabecalho-subtitulo {
        font-size: 13px;
        color: var(--text-secondary);
        text-transform: uppercase;
        letter-spacing: 2px;
        margin-top: 6px;
        font-weight: 600;
    }

    /* --- NAVEGAÇÃO --- */
    .tabs { margin-bottom: 20px; display: flex; gap: 8px; }
    .tabs button { 
        background: var(--pizzatto-red); 
        border: none; color: white; padding: 12px 22px; 
        border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 14px;
        transition: 0.3s;
        display: flex; align-items: center; gap: 10px;
    }
    .tabs button:hover { background: #b91c1c; transform: translateY(-1px); }
    .tabs button.active { background: #991b1b; border-bottom: 3px solid var(--pizzatto-orange); }
    .btn-sheets { background: #10b981 !important; } /* Mantém o verde pro Sheets */
    .btn-sheets:hover { background: #059669 !important; }

    /* --- DASHBOARD ELEMENTS --- */
    .kpis { display: flex; gap: 15px; margin-bottom: 20px; }
    .kpi { 
        background: var(--bg-card); padding: 20px; border-radius: 12px; flex: 1; 
        border: 1px solid var(--border); box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
        border-left: 5px solid var(--pizzatto-orange); /* Detalhe Laranja */
    }
    .kpi label { font-size: 11px; color: var(--text-secondary); display: block; margin-bottom: 8px; text-transform: uppercase; font-weight: 700; letter-spacing: 1px;}
    .kpi span { font-size: 24px; font-weight: 800; color: var(--text-primary); }

    /* 🔹 SOLUÇÃO PONTO 2: Filtros e Botão Excel Mantidos */
    .filtros { 
        display: flex; flex-wrap: wrap; gap: 10px; background: var(--bg-card); 
        padding: 15px; border-radius: 10px; margin-bottom: 20px; align-items: center;
        border: 1px solid var(--border);
    }
    .filtros input, .filtros select { 
        padding: 10px; border-radius: 6px; border: 1px solid var(--border); 
        background: var(--bg-input); color: white; font-size: 13px; outline: none;
        transition: 0.2s;
    }
    .filtros input:focus, .filtros select:focus { border-color: var(--pizzatto-orange); }
    
    .table-container { overflow-x: auto; background: var(--bg-card); border-radius: 12px; border: 1px solid var(--border); }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th, td { padding: 12px 15px; border-bottom: 1px solid var(--border); text-align: left; }
    th { background: #1f2937; color: #cbd5e1; font-weight: 600; text-transform: uppercase; font-size: 11px; }
    tr:hover { background: rgba(255,255,255,0.02); }
    
    /* 🔹 SOLUÇÃO PONTO 3: Placa na cor padrão e Números no padrão brasileiro */
    .num { text-align: right; font-family: monospace; font-size: 14px; }
    .placa-tabela { color: var(--text-primary); font-weight: bold; } /* Placa neutra/clara */
    
    .caro { color: var(--danger); font-weight: bold; }
    .barato { color: var(--success); font-weight: bold; }

    /* --- GERENCIAL --- */
    .grid-gerencial { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 15px; }
    .card-chart { background: var(--bg-card); padding: 25px; border-radius: 12px; border: 1px solid var(--border); }
    .card-chart h3 { font-size: 16px; margin-top: 0; color: var(--text-primary); border-bottom: 1px solid var(--border); padding-bottom: 12px; margin-bottom: 20px; }

    iframe { width: 100%; height: 80vh; border: none; border-radius: 12px; background: white; }
</style>
</head>
<body>

<div class="container">
    <header>
        <div class="cabecalho-conteudo">
            <div class="logo-container">
                <img src="logo.png?v=2" alt="PizzattoLog" class="logo-relatorio">
            </div>
            <div class="cabecalho-titulos">
                <h1>
                    <i data-lucide="fuel" class="icon-bomba"></i> <span class="bi-destaque">BI</span> Painel de Abastecimento
                </h1>
                <span class="cabecalho-subtitulo">PizzattoLog Transportes | Monitoramento Ticket Log</span>
            </div>
        </div>
    </header>

    <div class="tabs">
        <button id="btn-operacional" class="active" onclick="mostrarAba('operacional')">
            <i data-lucide="layout-dashboard"></i> Abastecimentos
        </button>
        <button id="btn-gerencial" onclick="mostrarAba('gerencial')">
            <i data-lucide="bar-chart-3"></i> KPI Gerencial
        </button>
        <button id="btn-sheets" class="btn-sheets" onclick="mostrarAba('sheets')">
            <i data-lucide="database"></i> Valores Diesel
        </button>
    </div>

    <div id="aba-operacional">
        <div class="kpis">
            <div class="kpi"><label>Total Investido</label><span id="total">R$ 0,00</span></div>
            <div class="kpi"><label>Litros Abastecidos</label><span id="litros">0,00</span></div>
            <div class="kpi"><label>Média R$ / Litro</label><span id="media">R$ 0,00</span></div>
        </div>

        <div class="filtros">
            <input id="filtroPlaca" placeholder="Filtrar Placa..." style="width:110px">
            <input id="filtroCidade" placeholder="Cidade..." style="width:150px">
            <input type="date" id="filtroDataInicio">
            <input type="date" id="filtroDataFim">
            <select id="filtroPosto"><option value="">Postos (Todos)</option></select>
            <select id="filtroUF"><option value="">UF</option></select>
            <button onclick="baixarExcel()" style="background:#475569; margin-left: auto;">
                <i data-lucide="download"></i> Baixar Excel
            </button>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Data</th><th>Hora</th><th>Placa</th><th>Posto de Combustível</th>
                        <th>Cidade</th><th>UF</th><th>Produto</th>
                        <th class="num">Litros</th><th class="num">Total</th><th class="num">Vl. Litro</th>
                    </tr>
                </thead>
                <tbody id="tabela"></tbody>
            </table>
        </div>
    </div>

    <div id="aba-gerencial" style="display:none;">
        <div class="grid-gerencial">
            <div class="card-chart">
                <h3>📈 Evolução Mensal de Despesas (R$)</h3>
                <div style="height: 350px;"><canvas id="graficoEvolucao"></canvas></div>
            </div>
            <div class="card-chart">
                <h3>📊 Gastos por Estado (UF) - Top a Bottom</h3>
                <div style="height: 350px;"><canvas id="graficoUF"></canvas></div>
            </div>
        </div>
        <div class="grid-gerencial">
            <div class="card-chart" style="grid-column: span 2;">
                <h3>🏆 Ranking de Postos (Maiores Gastos)</h3>
                <div style="height: 400px;"><canvas id="graficoPostos"></canvas></div>
            </div>
        </div>
    </div>

    <div id="aba-sheets" style="display:none;">
        <iframe src="https://docs.google.com/spreadsheets/d/e/2PACX-1vTMrknZbVmnLdLOW4knDIW4Wmjw6CMUyttdpw1c4SnxJP9HjmQcsH0heNOShzOrdHsOs7MDQuhZazcI/pubhtml?widget=true&amp;headers=false"></iframe>
    </div>
</div>

<script>
    let dados = [];
    let charts = {};

    /* FUNÇÕES DE FORMATAÇÃO PONTO 3: Padrão brasileiro */
    const moedaPTBR = v => "R$ " + Number(v || 0).toLocaleString("pt-BR", {minimumFractionDigits: 2, maximumFractionDigits: 2});
    const numeroPTBR = v => Number(v || 0).toLocaleString("pt-BR", {minimumFractionDigits: 2, maximumFractionDigits: 2});

    /* CARREGAMENTO DE DADOS E ÍCONES */
    fetch("transacoes.json")
        .then(r => r.json())
        .then(j => {
            dados = j;
            preencherFiltros();
            render(dados);
            lucide.createIcons();
        });

    function preencherFiltros() {
        let postos = new Set(), ufs = new Set();
        dados.forEach(i => {
            if (i.nomeReduzidoEstabelecimento) postos.add(i.nomeReduzidoEstabelecimento);
            if (i.uf) ufs.add(i.uf);
        });
        Array.from(postos).sort().forEach(p => filtroPosto.innerHTML += `<option value="${p}">${p}</option>`);
        Array.from(ufs).sort().forEach(u => filtroUF.innerHTML += `<option value="${u}">${u}</option>`);
    }

    /* SISTEMA DE FILTRAGEM */
    document.querySelectorAll("input, select").forEach(el => el.addEventListener("input", () => {
        const f = dados.filter(i => {
            let ok = true;
            if (filtroPlaca.value && !(i.placa || "").toLowerCase().includes(filtroPlaca.value.toLowerCase())) ok = false;
            if (filtroCidade.value && !(i.nomeCidade || "").toLowerCase().includes(filtroCidade.value.toLowerCase())) ok = false;
            if (filtroPosto.value && i.nomeReduzidoEstabelecimento !== filtroPosto.value) ok = false;
            if (filtroUF.value && i.uf !== filtroUF.value) ok = false;
            if (i.dataTransacao) {
                let d = i.dataTransacao.split("T")[0];
                if (filtroDataInicio.value && d < filtroDataInicio.value) ok = false;
                if (filtroDataFim.value && d > filtroDataFim.value) ok = false;
            }
            return ok;
        });
        render(f);
    }));

    function render(lista) {
        let tb = document.getElementById("tabela");
        tb.innerHTML = "";
        let total = 0, litros = 0;

        lista.forEach(i => {
            total += Number(i.valorTransacao || 0);
            litros += Number(i.litros || 0);
            let dt = i.dataTransacao ? new Date(i.dataTransacao) : new Date();
            let vl = Number(i.valorLitro || 0);
            
            tb.innerHTML += `<tr>
                <td>${dt.toISOString().split("T")[0]}</td><td>${dt.toTimeString().split(" ")[0]}</td>
                <td><strong class="placa-tabela">${i.placa}</strong></td><td>${i.nomeReduzidoEstabelecimento}</td><td>${i.nomeCidade}</td>
                <td>${i.uf}</td><td>${i.tipoCombustivel}</td>
                <td class="num">${numeroPTBR(i.litros)}</td>
                <td class="num">${moedaPTBR(i.valorTransacao)}</td>
                <td class="num ${vl > 6.0 ? 'caro' : ''}">${moedaPTBR(vl)}</td>
            </tr>`;
        });

        document.getElementById("total").innerText = moedaPTBR(total);
        document.getElementById("litros").innerText = numeroPTBR(litros);
        document.getElementById("media").innerText = moedaPTBR(total / litros || 0);
    }

    /* NAVEGAÇÃO */
    function mostrarAba(a) {
        ['aba-operacional', 'aba-gerencial', 'aba-sheets'].forEach(id => document.getElementById(id).style.display = 'none');
        document.getElementById('aba-' + a).style.display = 'block';
        
        document.querySelectorAll('.tabs button').forEach(b => b.classList.remove('active'));
        document.getElementById('btn-' + a).classList.add('active');

        if (a === 'gerencial') renderGerencial();
    }

    function renderGerencial() {
        // 1. Evolução Diária
        let hist = {};
        dados.forEach(i => { if(i.dataTransacao){ let d = i.dataTransacao.split("T")[0]; hist[d] = (hist[d] || 0) + Number(i.valorTransacao); } });
        updateChart('graficoEvolucao', 'line', Object.keys(hist).sort(), Object.values(hist), 'Despesa R$', '#dc2626'); // Vermelho

        // 🔹 SOLUÇÃO PONTO 4: Gasto por UF - Barras Deitadas Ordenadas Decrescente
        let ufsRaw = {};
        dados.forEach(i => { if(i.uf) ufsRaw[i.uf] = (ufsRaw[i.uf] || 0) + Number(i.valorTransacao); });
        
        // Ordena UF do maior gasto pro menor
        let ufsSorted = Object.entries(ufsRaw).sort((a,b) => b[1] - a[1]);
        updateChart('graficoUF', 'bar', ufsSorted.map(x=>x[0]), ufsSorted.map(x=>x[1]), 'Total por UF', '#3b82f6', 'y'); // Azul, indexAxis='y'

        // 3. Top Postos (Barras em pé, ordenado)
        let pRank = {};
        dados.forEach(i => { pRank[i.nomeReduzidoEstabelecimento] = (pRank[i.nomeReduzidoEstabelecimento] || 0) + Number(i.valorTransacao); });
        let topP = Object.entries(pRank).sort((a,b) => b[1] - a[1]).slice(0, 10);
        updateChart('graficoPostos', 'bar', topP.map(x=>x[0]), topP.map(x=>x[1]), 'Faturamento R$', '#f97316'); // Laranja, indexAxis='x'
    }

    function updateChart(id, type, labels, data, label, color, axis = 'x') {
        if (charts[id]) charts[id].destroy();
        charts[id] = new Chart(document.getElementById(id), {
            type: type,
            data: { labels: labels, datasets: [{ label: label, data: data, backgroundColor: color, borderColor: color, tension: 0.3 }] },
            options: { 
                indexAxis: axis, responsive: true, maintainAspectRatio: false,
                plugins: { legend: { labels: { color: '#94a3b8' } } },
                scales: { 
                    y: { ticks: { color: '#94a3b8' }, grid: { color: '#1f2937' } }, 
                    x: { ticks: { color: '#94a3b8' }, grid: { display: axis === 'x' ? false : true, color: '#1f2937' } } 
                }
            }
        });
    }

    function baixarExcel() {
        let table = document.querySelector("table");
        if(!table) return;
        
        let header = [];
        table.querySelectorAll("th").forEach(th => header.push(th.innerText));
        
        let csv = [header.join(";")];
        
        dados.filter(i => {
            let ok = true;
            if (filtroPlaca.value && !(i.placa || "").toLowerCase().includes(filtroPlaca.value.toLowerCase())) ok = false;
            // ... (mesma lógica de filtro da renderização para garantir consistência)
            return ok;
        }).forEach(i => {
            let dt = new Date(i.dataTransacao);
            csv.push([
                dt.toISOString().split("T")[0], dt.toTimeString().split(" ")[0],
                i.placa, i.nomeReduzidoEstabelecimento, i.nomeCidade, i.uf,
                i.tipoCombustivel, i.litros, i.valorTransacao, i.valorLitro
            ].join(";"));
        });

        let csvString = csv.join("\n");
        let blob = new Blob(["\ufeff", csvString], { type: "text/csv;charset=utf-8" });
        let a = document.createElement("a");
        a.href = URL.createObjectURL(blob); a.download = "relatorio_abastecimento.csv"; a.click();
    }
</script>
</body>
</html>
