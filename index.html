<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pizzatto Log - Gestão de Abastecimentos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { background-color: #0f172a; color: #f8fafc; font-family: 'Inter', sans-serif; }
        .card { background: #1e293b; border-radius: 12px; padding: 20px; border: 1px solid #334155; height: 100%; }
        .filtros { background: #1e293b; border-bottom: 2px solid #334155; padding: 15px 20px; position: sticky; top: 0; z-index: 50; }
        input, select { background: #0f172a; border: 1px solid #334155; color: white; padding: 8px 12px; border-radius: 6px; font-size: 14px; outline: none; }
        input:focus { border-color: #3b82f6; }
        .tab-btn { padding: 10px 20px; border-radius: 8px; font-weight: 600; transition: 0.3s; }
        .tab-active { background: #ef4444; color: white; }
        .tab-inactive { color: #94a3b8; }
        .tab-inactive:hover { background: #334155; }
        th { background: #334155; padding: 12px; text-align: left; font-size: 12px; text-transform: uppercase; }
        td { padding: 10px 12px; border-bottom: 1px solid #334155; font-size: 13px; }
        tr:hover { background: #1e293b; }
    </style>
</head>
<body>

    <header class="p-6 flex justify-between items-center">
        <h1 class="text-2xl font-bold flex items-center gap-2">
            <i data-lucide="fuel" class="text-red-500"></i> PIZZATTO LOG - PAINEL
        </h1>
        <div class="flex gap-2 bg-slate-800 p-1 rounded-xl">
            <button onclick="mudarAba('abastecimentos')" id="btn-abastecimentos" class="tab-btn tab-active">Abastecimentos</button>
            <button onclick="mudarAba('kpi')" id="btn-kpi" class="tab-btn tab-inactive">KPI Gerencial</button>
        </div>
    </header>

    <section class="filtros flex flex-wrap gap-3 items-center">
        <input type="text" id="filtroPlaca" placeholder="🚗 Filtrar Placa...">
        <input type="text" id="filtroCidade" placeholder="🏙️ Cidade...">
        <input type="date" id="dataInicio">
        <input type="date" id="dataFim">
        <select id="filtroPosto"><option value="">⛽ Postos (Todos)</option></select>
        <select id="filtroUF"><option value="">🌎 UF</option></select>
        <select id="filtroProduto"><option value="">🛢️ Produto (Todos)</option></select>
        
        <button onclick="baixarExcel()" class="ml-auto bg-green-600 hover:bg-green-700 px-4 py-2 rounded-lg flex items-center gap-2 font-bold transition">
            <i data-lucide="download" class="w-4 h-4"></i> Baixar Excel
        </button>
    </section>

    <main class="p-6">
        <div id="aba-abastecimentos">
            <div class="card overflow-x-auto">
                <table class="w-full">
                    <thead>
                        <tr>
                            <th>Data/Hora</th>
                            <th>Placa</th>
                            <th>Produto</th>
                            <th>Litros</th>
                            <th>Preço L</th>
                            <th>Total R$</th>
                            <th>Posto</th>
                            <th>Cidade/UF</th>
                        </tr>
                    </thead>
                    <tbody id="corpoTabela"></tbody>
                </table>
            </div>
        </div>

        <div id="aba-kpi" class="hidden space-y-6">
            <div class="card w-full" style="min-height: 400px;">
                <h3 class="text-lg font-semibold mb-4 text-red-400">📈 Evolução Diária de Gastos (R$)</h3>
                <canvas id="chartEvolucao"></canvas>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                <div class="card">
                    <h3 class="text-lg font-semibold mb-4 text-blue-400">📍 Gastos por Estado (UF)</h3>
                    <canvas id="chartUF"></canvas>
                </div>
                <div class="card">
                    <h3 class="text-lg font-semibold mb-4 text-orange-400">🏆 Ranking de Postos (Maiores Gastos)</h3>
                    <canvas id="chartPostos"></canvas>
                </div>
                <div class="card">
                    <h3 class="text-lg font-semibold mb-4 text-yellow-400">⚠️ Top 10 Preços Unitários</h3>
                    <div id="listaPrecos" class="space-y-3"></div>
                </div>
            </div>
        </div>
    </main>

    <script>
        let dadosOriginais = [];
        let charts = {};

        // Iniciar Lucide
        lucide.createIcons();

        // 1. CARREGAR DADOS (Busca o JSON gerado pelo Robô)
        async function carregarDados() {
            try {
                const r = await fetch('/api/dados');
                let j = await r.json();
                
                // ORDENAÇÃO: Data e Hora (Mais recente primeiro)
                dadosOriginais = j.sort((a, b) => new Date(b.dataTransacao) - new Date(a.dataTransacao));
                
                popularFiltros(dadosOriginais);
                processarEFiltrar();
            } catch (e) { console.error("Erro ao carregar:", e); }
        }

        // 2. POPULAR FILTROS DINAMICAMENTE
        function popularFiltros(dados) {
            const preencher = (id, campo) => {
                const lista = [...new Set(dados.map(d => d[campo]))].sort();
                const el = document.getElementById(id);
                el.innerHTML = `<option value="">${el.options[0].text}</option>`;
                lista.forEach(item => el.innerHTML += `<option value="${item}">${item}</option>`);
            };
            preencher('filtroPosto', 'nomePosto');
            preencher('filtroUF', 'estado');
            preencher('filtroProduto', 'tipoCombustivel');
        }

        // 3. MUDAR ABAS
        function mudarAba(aba) {
            document.getElementById('aba-abastecimentos').classList.toggle('hidden', aba !== 'abastecimentos');
            document.getElementById('aba-kpi').classList.toggle('hidden', aba !== 'kpi');
            document.getElementById('btn-abastecimentos').className = `tab-btn ${aba === 'abastecimentos' ? 'tab-active' : 'tab-inactive'}`;
            document.getElementById('btn-kpi').className = `tab-btn ${aba === 'kpi' ? 'tab-active' : 'tab-inactive'}`;
            if(aba === 'kpi') setTimeout(processarEFiltrar, 100); 
        }

        // 4. LÓGICA DE FILTRAGEM E ATUALIZAÇÃO
        function processarEFiltrar() {
            const fPlaca = document.getElementById('filtroPlaca').value.toUpperCase();
            const fCidade = document.getElementById('filtroCidade').value.toLowerCase();
            const fPosto = document.getElementById('filtroPosto').value;
            const fUF = document.getElementById('filtroUF').value;
            const fProd = document.getElementById('filtroProduto').value;
            const dIni = document.getElementById('dataInicio').value;
            const dFim = document.getElementById('dataFim').value;

            const filtrados = dadosOriginais.filter(d => {
                const data = d.dataTransacao.split('T')[0];
                return (!fPlaca || d.placa.includes(fPlaca)) &&
                       (!fCidade || d.cidade.toLowerCase().includes(fCidade)) &&
                       (!fPosto || d.nomePosto === fPosto) &&
                       (!fUF || d.estado === fUF) &&
                       (!fProd || d.tipoCombustivel === fProd) &&
                       (!dIni || data >= dIni) &&
                       (!dFim || data <= dFim);
            });

            atualizarTabela(filtrados);
            atualizarGraficos(filtrados);
        }

        // 5. ATUALIZAR TABELA
        function atualizarTabela(dados) {
            const corpo = document.getElementById('corpoTabela');
            corpo.innerHTML = dados.map(d => `
                <tr>
                    <td>${new Date(d.dataTransacao).toLocaleString('pt-BR')}</td>
                    <td class="font-bold text-red-400">${d.placa}</td>
                    <td>${d.tipoCombustivel}</td>
                    <td>${d.quantidade.toFixed(2)} L</td>
                    <td>R$ ${d.valorUnitario.toFixed(2)}</td>
                    <td class="font-bold">R$ ${d.valorTransacao.toFixed(2)}</td>
                    <td class="text-slate-400 text-xs">${d.nomePosto}</td>
                    <td>${d.cidade}/${d.estado}</td>
                </tr>
            `).join('');
        }

        // 6. ATUALIZAR GRÁFICOS (KPI)
        function atualizarGraficos(dados) {
            if (charts.evolucao) charts.evolucao.destroy();
            if (charts.uf) charts.uf.destroy();
            if (charts.postos) charts.postos.destroy();

            // Lógica Evolução Diária
            const dias = {};
            dados.forEach(d => {
                const dia = d.dataTransacao.split('T')[0];
                dias[dia] = (dias[dia] || 0) + d.valorTransacao;
            });
            const labelsEvolucao = Object.keys(dias).sort();

            charts.evolucao = new Chart(document.getElementById('chartEvolucao'), {
                type: 'line',
                data: {
                    labels: labelsEvolucao.map(d => d.split('-').reverse().slice(0,2).join('/')),
                    datasets: [{ label: 'Gasto R$', data: labelsEvolucao.map(l => dias[l]), borderColor: '#ef4444', tension: 0.3, fill: true, backgroundColor: 'rgba(239, 68, 68, 0.1)' }]
                },
                options: { maintainAspectRatio: false, scales: { x: { ticks: { maxTicksLimit: 15 } } } }
            });

            // Lógica UF (Torres Horizontais)
            const ufs = {};
            dados.forEach(d => ufs[d.estado] = (ufs[d.estado] || 0) + d.valorTransacao);
            const sortedUF = Object.entries(ufs).sort((a,b) => b[1] - a[1]);

            charts.uf = new Chart(document.getElementById('chartUF'), {
                type: 'bar',
                data: {
                    labels: sortedUF.map(x => x[0]),
                    datasets: [{ 
                        data: sortedUF.map(x => x[1]), 
                        backgroundColor: sortedUF.map((_,i) => `rgba(59, 130, 246, ${1 - i*0.1})`) 
                    }]
                },
                options: { indexAxis: 'y', plugins: { legend: { display: false } } }
            });

            // Lógica Postos (Horizontal - Nomes Retos)
            const pst = {};
            dados.forEach(d => pst[d.nomePosto] = (pst[d.nomePosto] || 0) + d.valorTransacao);
            const sortedPostos = Object.entries(pst).sort((a,b) => b[1] - a[1]).slice(0, 10);

            charts.postos = new Chart(document.getElementById('chartPostos'), {
                type: 'bar',
                data: {
                    labels: sortedPostos.map(x => x[0].substring(0,20)),
                    datasets: [{ data: sortedPostos.map(x => x[1]), backgroundColor: '#f97316' }]
                },
                options: { indexAxis: 'y', plugins: { legend: { display: false } }, scales: { y: { ticks: { font: { size: 10 } } } } }
            });

            // Top 10 Preços
            const topPrecos = [...dados].sort((a,b) => b.valorUnitario - a.valorUnitario).slice(0, 10);
            document.getElementById('listaPrecos').innerHTML = topPrecos.map(d => `
                <div class="flex justify-between items-center bg-slate-900 p-2 rounded border-l-4 border-yellow-500">
                    <div><p class="text-xs font-bold">${d.placa}</p><p class="text-[10px] text-slate-400">${d.nomePosto.substring(0,25)}</p></div>
                    <div class="text-right"><p class="text-yellow-500 font-bold">R$ ${d.valorUnitario.toFixed(2)}</p><p class="text-[10px]">${d.tipoCombustivel}</p></div>
                </div>
            `).join('');
        }

        // Listeners
        document.querySelectorAll('input, select').forEach(el => el.addEventListener('input', processarEFiltrar));
        
        // Início
        carregarDados();
    </script>
</body>
</html>
