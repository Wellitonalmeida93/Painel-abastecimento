<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Painel de Abastecimentos</title>

<style>
body {
    font-family: Arial;
    padding: 20px;
}

h1 {
    margin-bottom: 10px;
}

input {
    padding: 8px;
    margin-right: 10px;
    margin-bottom: 10px;
}

table {
    width: 100%;
    border-collapse: collapse;
}

th, td {
    border: 1px solid #ccc;
    padding: 8px;
    text-align: left;
}

th {
    background-color: #eee;
    cursor: pointer;
}

.alto {
    background-color: #ffcccc;
}

.medio {
    background-color: #fff3cd;
}
</style>
</head>

<body>

<h1>Painel de Abastecimentos</h1>

<input type="text" id="filtroPlaca" placeholder="Filtrar por placa">
<input type="text" id="filtroCidade" placeholder="Filtrar por cidade">

<table id="tabela">
    <thead>
        <tr>
            <th onclick="ordenar('dataTransacao')">Data</th>
            <th onclick="ordenar('placa')">Placa</th>
            <th>Posto</th>
            <th onclick="ordenar('nomeCidade')">Cidade</th>
            <th>UF</th>
            <th>Produto</th>
            <th onclick="ordenar('litros')">Litros</th>
            <th onclick="ordenar('valorTransacao')">Valor Total</th>
            <th onclick="ordenar('valorLitro')">Valor Unitário</th>
            <th>Cartão</th>
            <th>Tipo</th>
        </tr>
    </thead>
    <tbody></tbody>
</table>

<script>
let dados = []
let ordemAsc = true

// 🔹 Carregar JSON
fetch('./transacoes.json')
.then(res => res.json())
.then(json => {
    dados = json
    renderTabela(dados)
})

// 🔹 Formatações
function formatarMoeda(valor) {
    return "R$ " + Number(valor).toFixed(2).replace(".", ",")
}

function formatarNumero(valor) {
    return Number(valor).toFixed(2)
}

// 🔹 Renderizar tabela
function renderTabela(lista) {
    const tbody = document.querySelector("#tabela tbody")
    tbody.innerHTML = ""

    lista.forEach(t => {

        let classe = ""
        if (t.valorLitro > 7) classe = "alto"
        else if (t.valorLitro > 5) classe = "medio"

        const linha = `
        <tr>
            <td>${t.dataTransacao}</td>
            <td>${t.placa}</td>
            <td>${t.nomeReduzidoEstabelecimento}</td>
            <td>${t.nomeCidade}</td>
            <td>${t.uf}</td>
            <td>${t.tipoCombustivel}</td>
            <td>${formatarNumero(t.litros)}</td>
            <td>${formatarMoeda(t.valorTransacao)}</td>
            <td class="${classe}">${formatarMoeda(t.valorLitro)}</td>
            <td>${t.numeroCartao}</td>
            <td>${t.considerarTransacao}</td>
        </tr>`
        
        tbody.innerHTML += linha
    })
}

// 🔹 Filtros
document.getElementById("filtroPlaca").addEventListener("input", aplicarFiltros)
document.getElementById("filtroCidade").addEventListener("input", aplicarFiltros)

function aplicarFiltros() {
    const placa = document.getElementById("filtroPlaca").value.toLowerCase()
    const cidade = document.getElementById("filtroCidade").value.toLowerCase()

    const filtrado = dados.filter(t => {
        return (
            (!placa || (t.placa && t.placa.toLowerCase().includes(placa))) &&
            (!cidade || (t.nomeCidade && t.nomeCidade.toLowerCase().includes(cidade)))
        )
    })

    renderTabela(filtrado)
}

// 🔹 Ordenação
function ordenar(campo) {
    ordemAsc = !ordemAsc

    dados.sort((a, b) => {
        if (a[campo] < b[campo]) return ordemAsc ? -1 : 1
        if (a[campo] > b[campo]) return ordemAsc ? 1 : -1
        return 0
    })

    aplicarFiltros()
}
</script>

</body>
</html>
