<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BI | Gestão de Abastecimento | PizzattoLog</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@700&family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/choices.js/public/assets/styles/choices.min.css" />
<script src="https://cdn.jsdelivr.net/npm/choices.js/public/assets/scripts/choices.min.js"></script>

<style>
    /* --- CONFIGURAÇÕES GERAIS --- */
    :root {
        --bg-main: #0b0f19;
        --bg-card: #111827;
        --bg-input: #1e293b; 
        --pizzatto-red: #dc2626; 
        --pizzatto-orange: #f97316; 
        --text-primary: #f8fafc;
        --text-secondary: #94a3b8;
        --border: #334155;
        --success: #10b981;
        --danger: #f87171;
    }

    body { font-family: 'Inter', sans-serif; margin: 0; background: var(--bg-main); color: var(--text-primary); overflow-x: hidden; }
    .container { padding: 20px; max-width: 1600px; margin: auto; }
    h1, h2, h3 { font-family: 'Poppins', sans-serif; }

    /* --- TELA DE LOGIN --- */
    #tela-login { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: var(--bg-main); display: flex; align-items: center; justify-content: center; z-index: 99999; }
    .login-box { background: var(--bg-card); padding: 40px; border-radius: 16px; border: 1px solid var(--border); box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5); text-align: center; width: 100%; max-width: 400px; position: relative; }
    .login-logo { background: white; padding: 15px 25px; border-radius: 12px; display: inline-block; margin-bottom: 25px; }
    .login-logo img { height: 50px; }
    .login-box input { width: 100%; padding: 14px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg-input); color: white; margin-bottom: 15px; outline: none; }
    .login-box button { width: 100%; background: var(--pizzatto-red); color: white; border: none; padding: 14px; border-radius: 8px; font-weight: bold; cursor: pointer; display: flex; justify-content: center; align-items: center; gap: 10px; }

    /* --- CABEÇALHO --- */
    header { background: var(--bg-card); padding: 25px; border-radius: 12px; margin-bottom: 25px; display: flex; justify-content: center; align-items: center; border: 1px solid var(--border); box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3); }
    .cabecalho-conteudo { display: flex; align-items: center; gap: 25px; }
    .logo-container { background: white; padding: 10px 20px; border-radius: 10px; }
    .logo-relatorio { height: 60px; }
    .cabecalho-titulos h1 { font-size: 30px; margin: 0; }
    .bi-destaque { color: var(--pizzatto-red); font-weight: 800; }
    .cabecalho-subtitulo { font-size: 13px; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 2px; }

    /* --- NAVEGAÇÃO --- */
    .tabs { margin-bottom: 20px; display: flex; gap: 8px; flex-wrap: wrap; }
    .tabs button { background: var(--bg-input); border: 1px solid var(--border); color: var(--text-secondary); padding: 12px 22px; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; display: flex; align-items: center; gap: 10px; }
    .tabs button.active { background: var(--pizzatto-red); color: white; border-color: var(--pizzatto-red); }

    /* --- FILTROS (PADRONIZAÇÃO TOTAL) --- */
    .filtros { display: flex; flex-wrap: wrap; gap: 12px; background: var(--bg-card); padding: 20px; border-radius: 12px; margin-bottom: 20px; border: 1px solid var(--border); align-items: stretch; }
    
    .filtro-box { flex: 1; min-width: 150px; display: flex; flex-direction: column; justify-content: center; }

    /* Estilo igual para inputs comuns e data */
    .filtros input[type="text"], 
    .filtros input[type="date"], 
    .filtros .choices__inner { 
        height: 42px !important; 
        min-height: 42px !important;
        width: 100%; 
        padding: 0 12px !important; 
        border-radius: 8px !important; 
        border: 1px solid var(--border) !important; 
        background: var(--bg-input) !important; 
        color: var(--text-primary) !important; 
        font-size: 13px !important; 
        outline: none; 
        display: flex;
        align-items: center;
        box-sizing: border-box;
        transition: 0.2s;
    }

    .filtros input:focus, .filtros .is-focused .choices__inner { border-color: var(--pizzatto-orange) !important; }

    /* Ajustes específicos do Choices.js para modo Dark */
    .choices { margin-bottom: 0; width: 100%; }
    .choices__list--multiple .choices__item { background-color: var(--pizzatto-red) !important; border: none !important; border-radius: 4px !important; font-size: 11px; }
    .choices__input { background: transparent !important; color: white !important; font-size: 13px !important; margin-bottom: 0 !important; padding: 0 !important; }
    .choices__placeholder { opacity: 0.7; color: var(--text-secondary) !important; }
    .choices__list--dropdown { background-color: var(--bg-card) !important; border: 1px solid var(--border) !important; }
    .choices__list--dropdown .choices__item--selectable.is-highlighted { background-color: var(--pizzatto-red) !important; color: white !important; }

    .btn-excel { 
        background: var(--success); 
        color: white; 
        border: none; 
        padding: 0 20px; 
        border-radius: 8px; 
        font-weight: 700; 
        cursor: pointer; 
        display: flex; 
        align-items: center; 
        gap: 8px; 
        height: 42px;
        transition: 0.3s;
    }
    .btn-excel:hover { background: #059669; transform: translateY(-2px); }

    /* --- DASHBOARD ELEMENTS --- */
    .kpis { display: flex; gap: 15px; margin-bottom: 20px; flex-wrap: wrap; }
    .kpi { background: var(--bg-card); padding: 20px; border-radius: 12px; flex: 1; min-width: 200px; border: 1px solid var(--border); border-left: 5px solid var(--pizzatto-orange); }
    .kpi label { font-size: 11px; color: var(--text-secondary); display: block; margin-bottom: 5px; text-transform: uppercase; font-weight: 800; }
    .kpi span { font-size: 24px; font-weight: 800; }

    /* TABELAS */
    .table-container { overflow-x: auto; background: var(--bg-card); border-radius: 12px; border: 1px solid var(--border); }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th { background: #1e293b; color: #cbd5e1; padding: 12px; text-align: left; text-transform: uppercase; font-size: 11px; }
    td { padding: 12px; border-bottom: 1px solid var(--border); }
    tr:hover { background: rgba(255,255,255,0.02); }
    .num { text-align: right; font-family: monospace; font-size: 14px; }
</style>
</head>
<body>

<div id="tela-login">
    <div class="login-box">
        <div class="login-logo"><img src="logo.png" alt="PizzattoLog"></div>
        <h2>Acesso Restrito</h2>
        <input type="password" id="inputSenha" placeholder="Senha de acesso" onkeypress="if(event.key === 'Enter') verificarSenha()">
        <button onclick="verificarSenha()"><i data-lucide="lock"></i> Entrar</button>
        <p id="msg-erro" style="color: var(--danger); font-size: 12px; display:none; margin-top:10px;">Senha incorreta!</p>
    </div>
</div>

<div class="container" id="app-container" style="display: none;">
    <header>
        <div class="cabecalho-conteudo">
            <div class="logo-container"><img src="logo.png" alt="PizzattoLog" class="logo-relatorio"></div>
            <div class="cabecalho-titulos">
                <h1><span class="bi-destaque">BI</span> Painel de Abastecimento</h1>
                <span class="cabecalho-subtitulo">PizzattoLog Transportes | <span id="badgeAtualizacao">Sincronizando...</span></span>
            </div>
        </div>
    </header>

    <div class="tabs">
        <button id="btn-operacional" class="active" onclick="mostrarAba('operacional')"><i data-lucide="layout-dashboard"></i> Geral</button>
        <button id="btn-gerencial" onclick="mostrarAba('gerencial')"><i data-lucide="bar-chart-3"></i> KPIs</button>
        <button id="btn-sheets" onclick="mostrarAba('sheets')"><i data-lucide="database"></i> Planilha Base</button>
    </div>

    <div class="filtros">
        <div class="filtro-box">
            <input type="text" id="filtroPlaca" placeholder="🚗 Placa...">
        </div>
        <div class="filtro-box">
            <input type="text" id="filtroCidade" placeholder="🏙️ Cidade...">
        </div>
        <div class="filtro-box">
            <input type="date" id="filtroDataInicio" title="Data Início">
        </div>
        <div class="filtro-box">
            <input type="date" id="filtroDataFim" title="Data Fim">
        </div>
        <div class="filtro-box">
            <select id="filtroPosto" multiple></select>
        </div>
        <div class="filtro-box">
            <select id="filtroUF" multiple></select>
        </div>
        <div class="filtro-box">
            <select id="filtroProduto" multiple></select>
        </div>
        <button class="btn-excel" onclick="baixarExcel()"><i data-lucide="download"></i> Excel</button>
    </div>

    <div id="aba-operacional">
        <div class="kpis">
            <div class="kpi"><label>Investimento Total</label><span id="total">R$ 0,00</span></div>
            <div class="kpi"><label>Volume (Litros)</label><span id="litros">0,00</span></div>
            <div class="kpi"><label>Preço Médio/L</label><span id="media">R$ 0,00</span></div>
            <div class="kpi" style="border-left-color: var(--success);"><label>Consumo Médio</label><span id="mediaKml" style="color: var(--success);">0,00 km/l</span></div>
        </div>
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Data/Hora</th>
                        <th>Placa</th>
                        <th class="num">Odômetro</th>
                        <th>Posto</th>
                        <th>Cidade/UF</th>
                        <th>Produto</th>
                        <th class="num">Litros</th>
                        <th class="num">Total</th>
                        <th class="num" style="color: var(--pizzatto-orange);">KM Rodado</th>
                    </tr>
                </thead>
                <tbody id="tabela"></tbody>
            </table>
        </div>
    </div>

    <div id="aba-gerencial" style="display:none;">
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
            <div class="card-chart"><h3>Gastos por UF</h3><div style="height: 300px;"><canvas id="graficoUF"></canvas></div></div>
            <div class="card-chart"><h3>Top Postos</h3><div style="height: 300px;"><canvas id="graficoPostos"></canvas></div></div>
        </div>
    </div>

    <div id="aba-sheets" style="display:none;">
        <iframe src="https://docs.google.com/spreadsheets/d/e/2PACX-1vTMrknZbVmnLdLOW4knDIW4Wmjw6CMUyttdpw1c4SnxJP9HjmQcsH0heNOShzOrdHsOs7MDQuhZazcI/pubhtml" style="width: 100%; height: 70vh; border: none; border-radius: 8px;"></iframe>
    </div>
</div>

<script>
    lucide.createIcons();
    let dadosBrutos = []; let dadosFiltrados = []; let choicesInstances = {};

    const moeda = v => "R$ " + Number(v || 0).toLocaleString("pt-BR", {minimumFractionDigits: 2});

    function verificarSenha() {
        if(document.getElementById('inputSenha').value === 'Pizzatto_&3gm5zQ742i') {
            sessionStorage.setItem('autenticado', 'true');
            liberarAcesso();
        } else {
            document.getElementById('msg-erro').style.display = 'block';
        }
    }
    if(sessionStorage.getItem('autenticado') === 'true') liberarAcesso();

    function liberarAcesso() {
        document.getElementById('tela-login').style.display = 'none';
        document.getElementById('app-container').style.display = 'block';
        iniciarApp();
    }

    function iniciarApp() {
        fetch("transacoes.json?v=" + Date.now())
        .then(r => r.json())
        .then(j => {
            // Ordenação e Cálculo de KM
            let ordenados = j.sort((a,b) => new Date(a.dataTransacao) - new Date(b.dataTransacao));
            let kmAnt = {};
            ordenados.forEach(i => {
                let kmAt = Number(i.quilometragem || 0);
                i.kmRodado = 0;
                if(kmAt > 0 && kmAnt[i.placa] > 0) {
                    let diff = kmAt - kmAnt[i.placa];
                    i.kmRodado = diff > 0 ? diff : 0;
                }
                if(kmAt > 0) kmAnt[i.placa] = kmAt;
            });

            dadosBrutos = ordenados.sort((a,b) => new Date(b.dataTransacao) - new Date(a.dataTransacao));
            dadosFiltrados = [...dadosBrutos];

            if(dadosBrutos.length > 0) {
                let d = new Date(dadosBrutos[0].dataTransacao);
                document.getElementById('badgeAtualizacao').innerText = `Última nota: ${d.toLocaleDateString('pt-BR')} ${d.toLocaleTimeString('pt-BR', {hour:'2-digit', minute:'2-digit'})}`;
            }

            preencherFiltros();
            atualizarTudo();
        });
    }

    function preencherFiltros() {
        let postos = new Set(), ufs = new Set(), produtos = new Set();
        dadosBrutos.forEach(i => {
            if(i.nomeReduzidoEstabelecimento) postos.add(i.nomeReduzidoEstabelecimento);
            if(i.uf) ufs.add(i.uf);
            if(i.tipoCombustivel) produtos.add(i.tipoCombustivel);
        });

        const setupChoice = (id, set, placeholder) => {
            const el = document.getElementById(id);
            el.innerHTML = '';
            Array.from(set).sort().forEach(v => el.innerHTML += `<option value="${v}">${v}</option>`);
            choicesInstances[id] = new Choices(el, { 
                removeItemButton: true, 
                placeholderValue: placeholder,
                searchPlaceholderValue: 'Procurar...',
                itemSelectText: ''
            });
            el.addEventListener('change', aplicarFiltros);
        };

        setupChoice('filtroPosto', postos, 'Postos...');
        setupChoice('filtroUF', ufs, 'UF...');
        setupChoice('filtroProduto', produtos, 'Produtos...');

        ['filtroPlaca', 'filtroCidade', 'filtroDataInicio', 'filtroDataFim'].forEach(id => {
            document.getElementById(id).addEventListener('input', aplicarFiltros);
            document.getElementById(id).addEventListener('change', aplicarFiltros);
        });
    }

    function aplicarFiltros() {
        let p = document.getElementById('filtroPlaca').value.toLowerCase();
        let c = document.getElementById('filtroCidade').value.toLowerCase();
        let di = document.getElementById('filtroDataInicio').value;
        let df = document.getElementById('filtroDataFim').value;
        
        let selPostos = choicesInstances['filtroPosto'].getValue(true);
        let selUFs = choicesInstances['filtroUF'].getValue(true);
        let selProds = choicesInstances['filtroProduto'].getValue(true);

        dadosFiltrados = dadosBrutos.filter(i => {
            let data = i.dataTransacao.split('T')[0];
            return (!p || i.placa.toLowerCase().includes(p)) &&
                   (!c || i.nomeCidade.toLowerCase().includes(c)) &&
                   (!di || data >= di) && (!df || data <= df) &&
                   (selPostos.length === 0 || selPostos.includes(i.nomeReduzidoEstabelecimento)) &&
                   (selUFs.length === 0 || selUFs.includes(i.uf)) &&
                   (selProds.length === 0 || selProds.includes(i.tipoCombustivel));
        });
        atualizarTudo();
    }

    function atualizarTudo() {
        const tb = document.getElementById('tabela'); tb.innerHTML = '';
        let tot = 0, lit = 0, dist = 0;

        dadosFiltrados.slice(0, 150).forEach(i => {
            let d = new Date(i.dataTransacao);
            tot += Number(i.valorTransacao);
            lit += Number(i.litros);
            dist += Number(i.kmRodado);

            tb.innerHTML += `<tr>
                <td>${d.toLocaleDateString('pt-BR')} ${d.toLocaleTimeString('pt-BR', {hour:'2-digit', minute:'2-digit'})}</td>
                <td><strong>${i.placa}</strong></td>
                <td class="num">${i.quilometragem || '-'}</td>
                <td>${i.nomeReduzidoEstabelecimento}</td>
                <td>${i.nomeCidade}/${i.uf}</td>
                <td>${i.tipoCombustivel}</td>
                <td class="num">${Number(i.litros).toLocaleString('pt-BR')}</td>
                <td class="num">${moeda(i.valorTransacao)}</td>
                <td class="num" style="color:var(--pizzatto-orange); font-weight:bold">${i.kmRodado || '-'}</td>
            </tr>`;
        });

        document.getElementById('total').innerText = moeda(tot);
        document.getElementById('litros').innerText = lit.toLocaleString('pt-BR');
        document.getElementById('media').innerText = moeda(tot/lit || 0);
        document.getElementById('mediaKml').innerText = (dist/lit || 0).toFixed(2) + ' km/l';
    }

    function mostrarAba(a) {
        ['operacional', 'gerencial', 'sheets'].forEach(id => document.getElementById('aba-'+id).style.display = 'none');
        document.getElementById('aba-'+a).style.display = 'block';
        document.querySelectorAll('.tabs button').forEach(b => b.classList.remove('active'));
        document.getElementById('btn-'+a).classList.add('active');
    }

    function baixarExcel() {
        let csv = "DATA;PLACA;POSTO;CIDADE;UF;PRODUTO;LITROS;TOTAL;KM_RODADO\n";
        dadosFiltrados.forEach(i => {
            csv += `${i.dataTransacao};${i.placa};${i.nomeReduzidoEstabelecimento};${i.nomeCidade};${i.uf};${i.tipoCombustivel};${i.litros};${i.valorTransacao};${i.kmRodado}\n`;
        });
        let blob = new Blob(["\ufeff" + csv], { type: "text/csv;charset=utf-8" });
        let url = URL.createObjectURL(blob);
        let a = document.createElement("a"); a.href = url; a.download = "Abastecimentos_Pizzatto.csv"; a.click();
    }
</script>
</body>
</html>
