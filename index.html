<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Painel de Abastecimento Pizzattog</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    font-family: Arial;
    margin: 0;
    background: #0f172a;
    color: #e2e8f0;
}

.container { padding: 20px; }

.header {
    display: flex;
    align-items: center;
    gap: 15px;
    background: #020617;
    padding: 15px;
}

button {
    background: #2563eb;
    border: none;
    color: white;
    padding: 8px 12px;
    margin-right: 5px;
    border-radius: 5px;
    cursor: pointer;
}

.kpis {
    display: flex;
    gap: 15px;
    margin: 15px 0;
}

.kpi {
    background: #1e293b;
    padding: 15px;
    border-radius: 10px;
    flex: 1;
}

.kpi span {
    font-size: 20px;
    font-weight: bold;
}

.filtros input, .filtros select {
    padding: 6px;
    margin: 5px;
    border-radius: 5px;
    border: none;
}

table {
    width: 100%;
    border-collapse: collapse;
    background: #1e293b;
}

th, td {
    padding: 8px;
    border-bottom: 1px solid #334155;
}

th { background: #334155; }

td { text-align: right; }
.texto { text-align: left; }

.caro { color: #f87171; font-weight: bold; }
.medio { color: #facc15; }
.barato { color: #4ade80; }
</style>
</head>

<body>

<div class="header">
    <img src="logo.png" style="height:60px;">
    <h1>📊 Painel de Abastecimento Pizzattog</h1>
</div>

<div class="container">

<button onclick="mostrarAba('operacional')">Operacional</button>
<button onclick="mostrarAba('gerencial')">Gerencial</button>
<button onclick="mostrarAba('planilha')">Valores Postos</button>

<!-- OPERACIONAL -->
<div id="aba-operacional">

<div class="kpis">
    <div class="kpi">Total<br><span id="total"></span></div>
    <div class="kpi">Litros<br><span id="litros"></span></div>
    <div class="kpi">Média<br><span id="media"></span></div>
</div>

<table>
<thead>
<tr>
<th>Data</th><th>Hora</th><th>Placa</th><th>Posto</th>
<th>Cidade</th><th>UF</th><th>Produto</th>
<th>Litros</th><th>Total</th><th>Litro</th>
</tr>
</thead>
<tbody id="tabela"></tbody>
</table>

</div>

<!-- GERENCIAL -->
<div id="aba-gerencial" style="display:none">

<h2>📈 Análise Gerencial</h2>
<canvas id="grafico"></canvas>

<ul id="ranking"></ul>

</div>

<!-- VALORES POSTOS -->
<div id="aba-planilha" style="display:none">

<h2>⛽ Valores dos Postos</h2>

<div class="kpis">
    <div class="kpi">Registros<br><span id="totalPostos"></span></div>
    <div class="kpi">Menor Diesel<br><span id="menorDiesel"></span></div>
    <div class="kpi">Maior Diesel<br><span id="maiorDiesel"></span></div>
</div>

<div class="filtros">
    <input id="filtroCidadePosto" placeholder="Cidade">
    <input id="filtroPostoNome" placeholder="Posto">
    <select id="filtroUFPosto"><option value="">UF</option></select>
</div>

<table>
<thead>
<tr>
<th>Data</th>
<th>Posto</th>
<th>Cidade</th>
<th>UF</th>
<th>Diesel</th>
<th>S10</th>
</tr>
</thead>
<tbody id="tabelaPostos"></tbody>
</table>

</div>

</div>

<script>
let dados=[];

/* API */
fetch("/api/transacoes")
.then(r=>r.json())
.then(j=>{
    dados=j;
    render(dados);
});

/* ABAS */
function mostrarAba(a){
    document.getElementById("aba-operacional").style.display="none";
    document.getElementById("aba-gerencial").style.display="none";
    document.getElementById("aba-planilha").style.display="none";

    document.getElementById("aba-"+a).style.display="block";
}

/* FORMAT */
const moeda=v=>Number(v||0).toLocaleString("pt-BR",{style:"currency",currency:"BRL"});
const numero=v=>Number(v||0).toLocaleString("pt-BR",{minimumFractionDigits:2});

/* TABELA PRINCIPAL */
function render(lista){
    let tb=document.getElementById("tabela");
    tb.innerHTML="";

    let total=0,litros=0;

    lista.forEach(i=>{
        let d="", h="";
        if(i.dataTransacao){
            let dt=new Date(i.dataTransacao);
            d=dt.toISOString().split("T")[0];
            h=dt.toTimeString().split(" ")[0];
        }

        total+=Number(i.valorTransacao||0);
        litros+=Number(i.litros||0);

        tb.innerHTML+=`
        <tr>
        <td>${d}</td>
        <td>${h}</td>
        <td class="texto">${i.placa||""}</td>
        <td class="texto">${i.nomeReduzidoEstabelecimento||""}</td>
        <td class="texto">${i.nomeCidade||""}</td>
        <td>${i.uf||""}</td>
        <td class="texto">${i.tipoCombustivel||""}</td>
        <td>${numero(i.litros)}</td>
        <td>${moeda(i.valorTransacao)}</td>
        <td>${moeda(i.valorLitro)}</td>
        </tr>`;
    });

    document.getElementById("total").innerText=moeda(total);
    document.getElementById("litros").innerText=numero(litros);
    document.getElementById("media").innerText=moeda(total/litros||0);
}

/* PLANILHA */
let dadosPostos=[];

fetch("https://opensheet.elk.sh/2PACX-1vTMrknZbVmnLdLOW4knDIW4Wmjw6CMUyttdpw1c4SnxJP9HjmQcsH0heNOShzOrdHsOs7MDQuhZazcI/0")
.then(r=>r.json())
.then(j=>{
    dadosPostos=j;
    preencherFiltrosPostos();
    renderPostos(dadosPostos);
});

function preencherFiltrosPostos(){
    let ufs=new Set();
    dadosPostos.forEach(i=>ufs.add(i.UF));
    ufs.forEach(u=>filtroUFPosto.innerHTML+=`<option>${u}</option>`);
}

document.querySelectorAll("#aba-planilha input, #aba-planilha select")
.forEach(i=>i.addEventListener("input",filtrarPostos));

function filtrarPostos(){
    let f=dadosPostos.filter(i=>{
        return (!filtroCidadePosto.value || i.Cidade?.toLowerCase().includes(filtroCidadePosto.value.toLowerCase())) &&
               (!filtroPostoNome.value || i.Posto?.toLowerCase().includes(filtroPostoNome.value.toLowerCase())) &&
               (!filtroUFPosto.value || i.UF===filtroUFPosto.value);
    });
    renderPostos(f);
}

function renderPostos(lista){
    let tb=document.getElementById("tabelaPostos");
    tb.innerHTML="";

    let menor=999, maior=0;

    lista.forEach(i=>{
        let diesel=parseFloat((i["Diesel Comum"]||"0").replace(",","."));
        let s10=parseFloat((i["Diesel S10"]||"0").replace(",","."));

        if(diesel>0){
            if(diesel<menor) menor=diesel;
            if(diesel>maior) maior=diesel;
        }

        tb.innerHTML+=`
        <tr>
        <td>${i.Data||""}</td>
        <td class="texto">${i.Posto||""}</td>
        <td class="texto">${i.Cidade||""}</td>
        <td>${i.UF||""}</td>
        <td>${moeda(diesel)}</td>
        <td>${moeda(s10)}</td>
        </tr>`;
    });

    totalPostos.innerText=lista.length;
    menorDiesel.innerText=moeda(menor);
    maiorDiesel.innerText=moeda(maior);
}
</script>

</body>
</html>
