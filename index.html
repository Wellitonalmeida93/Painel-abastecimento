<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Painel Abastecimento</title>

<style>
body {
    font-family: Arial;
    background: #0f172a;
    color: white;
    padding: 20px;
}

h1 {
    margin-bottom: 20px;
}

.card {
    background: #1e293b;
    padding: 15px;
    border-radius: 10px;
    margin-bottom: 20px;
}

table {
    width: 100%;
    border-collapse: collapse;
    background: #1e293b;
}

th, td {
    padding: 10px;
    border-bottom: 1px solid #334155;
}

th {
    background: #334155;
}

input {
    padding: 8px;
    margin-right: 10px;
}
</style>
</head>

<body>

<h1>🚛 Painel de Abastecimento</h1>

<div class="card">
    <strong>Total Registros:</strong> <span id="total">0</span>
</div>

<input type="text" id="filtroPlaca" placeholder="Filtrar placa">

<table>
<thead>
<tr>
<th>Data</th>
<th>Placa</th>
<th>Posto</th>
<th>Cidade</th>
<th>Produto</th>
<th>Litros</th>
<th>Total</th>
</tr>
</thead>
<tbody id="tabela"></tbody>
</table>

<script>
let dados = [];

function formatarMoeda(v) {
    return Number(v || 0).toLocaleString("pt-BR", {
        style: "currency",
        currency: "BRL"
    });
}

function carregar() {
    fetch("/api/transacoes")
        .then(r => r.json())
        .then(res => {
            console.log("DADOS:", res);

            dados = res;
            document.getElementById("total").innerText = dados.length;

            render(dados);
        });
}

function render(lista) {
    const tabela = document.getElementById("tabela");
    tabela.innerHTML = "";

    lista.forEach(item => {
        const dt = new Date(item.dataTransacao);

        tabela.innerHTML += `
        <tr>
            <td>${dt.toLocaleDateString()}</td>
            <td>${item.placa || ""}</td>
            <td>${item.nomeReduzidoEstabelecimento || ""}</td>
            <td>${item.nomeCidade || ""}</td>
            <td>${item.tipoCombustivel || ""}</td>
            <td>${item.litros || 0}</td>
            <td>${formatarMoeda(item.valorTransacao)}</td>
        </tr>
        `;
    });
}

document.getElementById("filtroPlaca").addEventListener("input", function() {
    const valor = this.value.toLowerCase();

    const filtrado = dados.filter(d =>
        (d.placa || "").toLowerCase().includes(valor)
    );

    render(filtrado);
});

carregar();
</script>

</body>
</html>
