<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Painel de Abastecimentos</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }

        h1 {
            margin-bottom: 20px;
        }

        input {
            padding: 8px;
            margin-right: 10px;
        }

        table {
            border-collapse: collapse;
            width: 100%;
            margin-top: 20px;
        }

        th, td {
            border: 1px solid #ccc;
            padding: 8px;
        }

        th {
            background-color: #f0f0f0;
        }

        td {
            text-align: right;
        }

        td.texto {
            text-align: left;
        }

        /* 🔥 CORES */
        .caro {
            background-color: #f8d7da;
        }

        .medio {
            background-color: #fff3cd;
        }

        .barato {
            background-color: #d4edda;
        }
    </style>
</head>

<body>

<h1>Painel de Abastecimentos</h1>

<input type="text" id="filtroPlaca" placeholder="Filtrar por placa">
<input type="text" id="filtroCidade" placeholder="Filtrar por cidade">

<table>
    <thead>
        <tr>
            <th>Data</th>
            <th>Hora</th>
            <th>Placa</th>
            <th>Posto</th>
            <th>Cidade</th>
            <th>UF</th>
            <th>Produto</th>
            <th>Litros</th>
            <th>Valor Total</th>
            <th>Valor Unitário</th>
            <th>Cartão</th>
        </tr>
    </thead>
    <tbody id="tabela"></tbody>
</table>

<script>
let dados = [];

// 🔹 FORMATAÇÕES
function formatarMoeda(valor) {
    if (valor === null || valor === undefined) return "";
    return Number(valor).toLocaleString("pt-BR", {
        style: "currency",
        currency: "BRL"
    });
}

function formatarNumero(valor) {
    if (valor === null || valor === undefined) return "";
    return Number(valor).toLocaleString("pt-BR", {
        minimumFractionDigits: 2,
        maximumFractionDigits: 2
    });
}

// 🔹 CARREGAR DADOS
fetch("transacoes.json")
    .then(res => res.json())
    .then(json => {
        dados = json;
        renderizarTabela(dados);
    });

// 🔹 RENDERIZAR
function renderizarTabela(lista) {
    const tabela = document.getElementById("tabela");
    tabela.innerHTML = "";

    lista.forEach(item => {

        let data = "";
        let hora = "";

        if (item.dataTransacao) {
            const dt = new Date(item.dataTransacao);
            data = dt.toISOString().split("T")[0];
            hora = dt.toTimeString().split(" ")[0];
        }

        // 🔥 REGRA DE COR
        let classeCor = "";
        const valor = Number(item.valorLitro);

        if (valor >= 7.5) {
            classeCor = "caro";
        } else if (valor >= 6.5) {
            classeCor = "medio";
        } else {
            classeCor = "barato";
        }

        tabela.innerHTML += `
            <tr>
                <td>${data}</td>
                <td>${hora}</td>
                <td class="texto">${item.placa || ""}</td>
                <td class="texto">${item.nomeReduzidoEstabelecimento || ""}</td>
                <td class="texto">${item.nomeCidade || ""}</td>
                <td>${item.uf || ""}</td>
                <td class="texto">${item.tipoCombustivel || ""}</td>
                <td>${formatarNumero(item.litros)}</td>
                <td>${formatarMoeda(item.valorTransacao)}</td>
                <td class="${classeCor}">${formatarMoeda(item.valorLitro)}</td>
                <td>${item.numeroCartao || ""}</td>
            </tr>
        `;
    });
}

// 🔹 FILTROS
document.getElementById("filtroPlaca").addEventListener("input", filtrar);
document.getElementById("filtroCidade").addEventListener("input", filtrar);

function filtrar() {
    const placa = document.getElementById("filtroPlaca").value.toLowerCase();
    const cidade = document.getElementById("filtroCidade").value.toLowerCase();

    const filtrados = dados.filter(item =>
        (item.placa || "").toLowerCase().includes(placa) &&
        (item.nomeCidade || "").toLowerCase().includes(cidade)
    );

    renderizarTabela(filtrados);
}
</script>

</body>
</html>
