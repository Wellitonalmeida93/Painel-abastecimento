<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Painel de Manutenção</title>
</head>
<body>

    <h1>Painel de Manutenção</h1>

    <table border="1">
        <thead>
            <tr>
                <th>Placa</th>
                <th>Categoria</th>
                <th>Serviço</th>
                <th>Data</th>
                <th>Oficina</th>
                <th>Vencimento</th>
            </tr>
        </thead>
        <tbody id="tabela"></tbody>
    </table>

    <script>
        async function carregarDados() {
            const resposta = await fetch("http://127.0.0.1:5000/manutencoes");
            const dados = await resposta.json();

            const tabela = document.getElementById("tabela");

            dados.forEach(item => {
                const linha = `
                    <tr>
                        <td>${item.PLACA}</td>
                        <td>${item.CATEGORIA}</td>
                        <td>${item.SERVICO_REALIZADO}</td>
                        <td>${item.DATA_CONCLUSAO}</td>
                        <td>${item.OFICINA_EXECUTORA}</td>
                        <td>${item.PROXIMO_VENCIMENTO_2027}</td>
                    </tr>
                `;
                tabela.innerHTML += linha;
            });
        }

        carregarDados();
    </script>
setInterval(() => {
    document.getElementById("tabela").innerHTML = "";
    carregarDados();
}, 30000); // atualiza a cada 30 segundos

</body>
</html>
