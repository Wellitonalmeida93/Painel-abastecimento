<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PizzattoLog | BI Abastecimento</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700;800&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
    /* --- PALETA DE CORES PIZZATTOLOG --- */
    :root {
        --bg-main: #0b0f19;
        --bg-card: #111827;
        --bg-input: #0f172a;
        --border: #1f2937;
        
        --pizzatto-red: #dc2626; /* Vermelho da Logo */
        --pizzatto-orange: #f97316; /* Laranja da Logo */
        
        --text-primary: #f8fafc;
        --text-secondary: #94a3b8;
        
        --success: #4ade80;
        --danger: #f87171;
    }

    /* --- ESTILOS GERAIS --- */
    body { font-family: 'Inter', sans-serif; margin: 0; background: var(--bg-main); color: var(--text-primary); overflow-x: hidden; }
    .container { padding: 20px; max-width: 1600px; margin: auto; }
    h1, h2, h3 { font-family: 'Poppins', sans-serif; }

    /* --- CABEÇALHO PREMIUM (Centralizado com Logo) --- */
    header {
        background: var(--bg-card);
        padding: 25px;
        border-radius: 12px;
        margin-bottom: 25px;
        display: flex;
        justify-content: center;
        align-items: center;
        border: 1px solid var(--border);
        box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
        position: relative;
        overflow: hidden;
    }

    /* Brilho de Fundo Laranja */
    header::after {
        content: "";
        position: absolute;
        left: -50%; top: -100%;
        width: 200%; height: 200%;
        background: radial-gradient(circle, rgba(249,115,22,0.06) 0%, rgba(255,255,255,0) 70%);
        pointer-events: none;
    }

    .cabecalho-conteudo { display: flex; align-items: center; gap: 25px; z-index: 1; }

    .logo-relatorio {
        height: 70px;
        border-radius: 10px;
        border: 1px solid var(--border);
        padding: 5px;
        background: rgba(255,255,255,0.02);
    }

    .cabecalho-titulos { display: flex; flex-direction: column; }
    .cabecalho-titulos h1 {
        font-size: 28px;
        font-weight: 700;
        margin: 0;
        color: var(--text-primary);
        letter-spacing: -0.5px;
        display: flex;
        align-items: center;
        gap: 12px;
    }

    /* Ícone de Bomba Laranja */
    .icon-bomba {
        color: var(--pizzatto-orange);
        width: 28px; height: 28px;
    }

    .bi-destaque {
        color: var(--pizzatto-red);
        font-weight: 800;
    }

    .cabecalho-subtitulo {
        font-size: 13px;
        color: var(--text-secondary);
        text-transform: uppercase;
        letter-spacing: 2px;
        margin-top: 6px;
        font-weight: 600;
    }

    /* --- NAVEGAÇÃO (Cores PizzattoLog) --- */
    .tabs { margin-bottom: 20px; display: flex; gap: 8px; }
    .tabs button { 
        background: var(--pizzatto-red); /* Vermelho */
        border: none; color: white; padding: 10px 20px; 
        border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 14px;
        transition: 0.2s;
        display: flex; align-items: center; gap: 8px;
    }
    .tabs button:hover { 
        background: #b91c1c; /* Vermelho escuro */
        transform: translateY(-1px); 
    }
    
    .tabs button.active {
        background: #991b1b; /* Fica mais escuro quando ativo */
        border-left: 3px solid var(--pizzatto-orange);
    }
    
    .btn-sheets { background: #10b981 !important; } /* Mantém o verde pro Sheets */
    .btn-sheets:hover { background: #059669 !important; }

    /* --- DASHBOARD ELEMENTS --- */
    .kpis { display: flex; gap: 15px; margin-bottom: 20px; }
    .kpi { 
        background: var(--bg-card); padding: 18px; border-radius: 10px; flex: 1; 
        border: 1px solid var(--border); box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
        border-left: 4px solid var(--pizzatto-orange); /* Detalhe Laranja */
    }
    .kpi label { font-size: 11px; color: var(--text-secondary); display: block; margin-bottom: 8px; text-transform: uppercase; font-weight: 700; letter-spacing: 0.5px;}
    .kpi span { font-size: 22px; font-weight: 800; color: var(--text-primary); }

    .filtros { 
        display: flex; flex-wrap: wrap; gap: 10px; background: var(--bg-card); 
        padding: 15px; border-radius: 10px; margin-bottom: 20px; align-items: center;
        border: 1px solid var(--border);
    }
    .filtros input, .filtros select { 
        padding: 8px 12px; border-radius: 6px; border: 1px solid var(--border); 
        background: var(--bg-input); color: white; font-size: 13px; outline: none;
        transition: 0.2s;
    }
    .filtros input:focus, .filtros select:focus {
        border-color: var(--pizzatto-orange);
    }
    
    .table-container { overflow-x: auto; background: var(--bg-card); border-radius: 10px; border: 1px solid var(--border); }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th, td { padding: 12px 15px; border-bottom: 1px solid var(--border); text-align: left; }
    th { background: #1f2937; color: #cbd5e1; font-weight: 600; text-transform: uppercase; font-size: 11px; }
    tr:hover { background: rgba(255,255,255,0.02); }
    
    .num { text-align: right; font-family: monospace; font-size: 14px; }
    .caro { color: var(--danger); font-weight: bold; }
    .barato { color: var(--success); font-weight: bold; }

    /* --- GERENCIAL --- */
    .grid-gerencial { display: grid; grid-template-columns: 2fr 1fr; gap: 20px; margin-top: 15px; }
    .card-chart { background: var(--bg-card); padding: 20px; border-radius: 10px; border: 1px solid var(--border); }
    .card-chart h3 { font-size: 15px; margin-top: 0; color: var(--text-primary); border-bottom: 1px solid var(--border); padding-bottom: 12px; margin-bottom: 15px; }

    iframe { width: 100%; height: 80vh; border: none; border-radius: 10px; background: white; }
</style>
</head>
<body>

<div class="container">
    <header>
        <div class="cabecalho-conteudo">
            <img src="logo.png?v=1" alt="PizzattoLog" class="logo-relatorio">
            <div class="cabecalho-titulos">
                <h1>
                    <i data-lucide="fuel" class="icon-bomba"></i> <span class="bi-destaque">BI</span> Painel de Abastecimento
                </h1>
                <span class="cabecalho-subtitulo">PizzattoLog Transportes | Monitoramento Ticket Log</span>
            </div>
        </div>
    </header>

    <div class="tabs">
        <button id="btn-operacional" class="active" onclick="mostrarAba('operacional')">
            <i data-lucide="layout-dashboard"></i> Abastecimentos
        </button>
        <button id="btn-gerencial" onclick="mostrarAba('gerencial')">
            <i data-lucide="bar-chart-3"></i> KPI
        </button>
        <button id="btn-sheets" class="btn-sheets" onclick="mostrarAba('sheets')">
            <i data-lucide="database"></i> Valores Diesel
        </button>
    </div>

    <div id="aba-operacional">
        <div class="kpis">
            <div class="kpi"><label>Investimento Acumulado</label><span id="total">R$ 0,00</span></div>
            <div class="kpi"><label>Volume Total (L)</label><span id="litros">0,00</span></div>
            <div class="kpi"><label>Preço Médio / Litro</label><span id="media">R$ 0,00</span></div>
        </div>

        <div class="filtros">
            <input id="filtroPlaca" placeholder="Filtrar Placa..." style="width:110px">
            <input id="filtroCidade" placeholder="Cidade..." style="width:150px">
            <input type="date" id="filtroDataInicio">
            <input type="date" id="filtroDataFim">
            <select id="filtroPosto"><option value="">Postos (Todos)</option></select>
            <select id="filtroUF"><option value="">UF</option></select>
            <button onclick="baixarExcel()" style="background:#475569; margin-left: auto;">
                <i data-lucide="download"></i> Excel
            </button>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Data</th><th>Hora</th><th>Placa</th><th>Posto</th>
                        <th>Cidade</th><th>UF</th><th>Produto</th>
                        <th class="num">Litros</th><th class="num">Total</th><th class="num">Vl. Litro</th>
                    </tr>
                </thead>
                <tbody id="tabela"></tbody>
            </table>
        </div>
    </div>

    <div id="aba-gerencial" style="display:none;">
        <div class="grid-gerencial">
            <div class="card-chart">
                <h3>📈 Evolução de Gastos (R$)</h3>
                <canvas id="graficoEvolucao"></canvas>
            </div>
            <div class="card-chart">
                <h3>🌍 Gasto por UF</h3>
                <canvas id="graficoUF"></canvas>
            </div>
        </div>
        <div class="grid-gerencial">
            <div class="card-chart">
                <h3>🏆 Ranking de Postos (Top 10)</h3>
                <canvas id="graficoPostos"></canvas>
            </div>
            <div class="card-chart">
                <h3>🚨 Preços Unitários Elevados (Top 5)</h3>
                <table style="width:100%; border-collapse: collapse;">
                    <thead><tr style="border-bottom: 1px solid var(--border);"><th style="padding-bottom:10px; color:var(--text-secondary);">Placa</th><th style="color:var(--text-secondary);">Posto</th><th class="num" style="color:var(--text-secondary);">Preço/L</th></tr></thead>
                    <tbody id="listaMaioresPrecos"></tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="aba-sheets" style="display:none;">
        <iframe src="https://docs.google.com/spreadsheets/d/e/2PACX-1vTMrknZbVmnLdLOW4knDIW4Wmjw6CMUyttdpw1c4SnxJP9HjmQcsH0heNOShzOrdHsOs7MDQuhZazcI/pubhtml?widget=true&amp;headers=false"></iframe>
    </div>
</div>

<script>
let dados = [];
let charts = {};

const moeda = v => Number(v || 0).toLocaleString("pt-BR", { style: "currency", currency: "BRL" });
const numero = v => Number(v || 0).toLocaleString("pt-BR", { minimumFractionDigits: 2 });

/* CARREGAMENTO DE DADOS E ÍCONES */
fetch("transacoes.json")
    .then(r => r.json())
    .then(j => {
        dados = j;
        preencherFiltros();
        render(dados);
        lucide.createIcons(); // Ativa os ícones Lucide
    });

function preencherFiltros() {
    let postos = new Set(), ufs = new Set();
    dados.forEach(i => {
        if (i.nomeReduzidoEstabelecimento) postos.add(i.nomeReduzidoEstabelecimento);
        if (i.uf) ufs.add(i.uf);
    });
    Array.from(postos).sort().forEach(p => filtroPosto.innerHTML += `<option value="${p}">${p}</option>`);
    Array.from(ufs).sort().forEach(u => filtroUF.innerHTML += `<option value="${u}">${u}</option>`);
}

/* SISTEMA DE FILTRAGEM */
document.querySelectorAll("input, select").forEach(el => el.addEventListener("input", () => {
    const f = dados.filter(i => {
        let ok = true;
        if (filtroPlaca.value && !(i.placa || "").toLowerCase().includes(filtroPlaca.value.toLowerCase())) ok = false;
        if (filtroCidade.value && !(i.nomeCidade || "").toLowerCase().includes(filtroCidade.value.toLowerCase())) ok = false;
        if (filtroPosto.value && i.nomeReduzidoEstabelecimento !== filtroPosto.value) ok = false;
        if (filtroUF.value && i.uf !== filtroUF.value) ok = false;
        if (i.dataTransacao) {
            let d = i.dataTransacao.split("T")[0];
            if (filtroDataInicio.value && d < filtroDataInicio.value) ok = false;
            if (filtroDataFim.value && d > filtroDataFim.value) ok = false;
        }
        return ok;
    });
    render(f);
}));

function render(lista) {
    let tb = document.getElementById("tabela");
    tb.innerHTML = "";
    let total = 0, litros = 0;

    lista.forEach(i => {
        total += Number(i.valorTransacao || 0);
        litros += Number(i.litros || 0);
        let dt = i.dataTransacao ? new Date(i.dataTransacao) : new Date();
        let vl = Number(i.valorLitro || 0);
        
        tb.innerHTML += `<tr>
            <td>${dt.toISOString().split("T")[0]}</td><td>${dt.toTimeString().split(" ")[0]}</td>
            <td><strong>${i.placa}</strong></td><td>${i.nomeReduzidoEstabelecimento}</td><td>${i.nomeCidade}</td>
            <td>${i.uf}</td><td>${i.tipoCombustivel}</td><td class="num">${numero(i.litros)}</td>
            <td class="num">${moeda(i.valorTransacao)}</td><td class="num ${vl > 6.7 ? 'caro' : 'barato'}">${moeda(vl)}</td>
        </tr>`;
    });

    document.getElementById("total").innerText = moeda(total);
    document.getElementById("litros").innerText = numero(litros);
    document.getElementById("media").innerText = moeda(total / litros || 0);
}

/* NAVEGAÇÃO */
function mostrarAba(a) {
    ['aba-operacional', 'aba-gerencial', 'aba-sheets'].forEach(id => document.getElementById(id).style.display = 'none');
    document.getElementById('aba-' + a).style.display = 'block';
    
    // Atualiza classe ativa nos botões
    document.querySelectorAll('.tabs button').forEach(b => b.classList.remove('active'));
    document.getElementById('btn-' + a).classList.add('active');

    if (a === 'gerencial') renderGerencial();
}

function renderGerencial() {
    // 1. Evolução Diária
    let hist = {};
    dados.forEach(i => { if(i.dataTransacao){ let d = i.dataTransacao.split("T")[0]; hist[d] = (hist[d] || 0) + Number(i.valorTransacao); } });
    updateChart('graficoEvolucao', 'line', Object.keys(hist).sort(), Object.values(hist), 'Despesa R$', '#dc2626'); // Vermelho

    // 2. Por UF
    let ufs = {};
    dados.forEach(i => { ufs[i.uf] = (ufs[i.uf] || 0) + Number(i.valorTransacao); });
    updateChart('graficoUF', 'doughnut', Object.keys(ufs), Object.values(ufs), 'Total por UF', ['#dc2626','#f97316','#10b981','#6366f1','#f59e0b']); // Mix de cores

    // 3. Top Postos
    let pRank = {};
    dados.forEach(i => { pRank[i.nomeReduzidoEstabelecimento] = (pRank[i.nomeReduzidoEstabelecimento] || 0) + Number(i.valorTransacao); });
    let topP = Object.entries(pRank).sort((a,b) => b[1] - a[1]).slice(0, 10);
    updateChart('graficoPostos', 'bar', topP.map(x => x[0]), topP.map(x => x[1]), 'Faturamento R$', '#f97316', 'y'); // Laranja

    // 4. Ranking Preço Unitário (Top 5 Caros)
    let maioresP = [...dados].sort((a,b) => Number(b.valorLitro || 0) - Number(a.valorLitro || 0)).slice(0, 5);
    document.getElementById("listaMaioresPrecos").innerHTML = maioresP.map(i => `
        <tr style="border-bottom: 1px solid var(--border);"><td style="padding:8px 0;">${i.placa}</td><td><small>${i.nomeReduzidoEstabelecimento}</small></td><td class="num caro">${moeda(i.valorLitro)}</td></tr>
    `).join("");
}

function updateChart(id, type, labels, data, label, color, axis = 'x') {
    if (charts[id]) charts[id].destroy();
    charts[id] = new Chart(document.getElementById(id), {
        type: type,
        data: { labels: labels, datasets: [{ label: label, data: data, backgroundColor: color, borderColor: color, tension: 0.3 }] },
        options: { 
            indexAxis: axis, responsive: true, 
            plugins: { legend: { display: type === 'doughnut', labels: { color: '#94a3b8' } } },
            scales: axis === 'x' ? { y: { ticks: { color: '#94a3b8' }, grid: { color: '#1f2937' } }, x: { ticks: { color: '#94a3b8' }, grid: { display: false } } } : { x: { ticks: { color: '#94a3b8' }, grid: { display: false } }, y: { ticks: { color: '#94a3b8' }, grid: { display: false } } }
        }
    });
}

function baixarExcel() {
    let t = document.querySelector("table").outerHTML;
    let blob = new Blob(["\ufeff", t], { type: "application/vnd.ms-excel" });
    let a = document.createElement("a");
    a.href = URL.createObjectURL(blob); a.download = "relatorio_pizzattolog.xls"; a.click();
}
</script>
</body>
</html>
