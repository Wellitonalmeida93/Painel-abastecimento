<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Painel de Abastecimentos</title>

<style>
body {
    font-family: Arial;
    margin: 20px;
    background: #f5f6fa;
}

h1 {
    margin-bottom: 10px;
}

/* KPIs */
.kpis {
    display: flex;
    gap: 20px;
    margin-bottom: 20px;
}

.kpi {
    background: white;
    padding: 15px;
    border-radius: 8px;
    flex: 1;
    box-shadow: 0 2px 5px rgba(0,0,0,0.1);
}

.kpi h3 {
    margin: 0;
    font-size: 14px;
    color: #666;
}

.kpi p {
    font-size: 22px;
    margin: 5px 0 0;
    font-weight: bold;
}

/* Filtros */
.filtros {
    margin-bottom: 15px;
}

input {
    padding: 8px;
    margin-right: 10px;
}

/* Botão */
button {
    padding: 8px 12px;
    cursor: pointer;
}

/* Tabela */
table {
    border-collapse: collapse;
    width: 100%;
    background: white;
}

th, td {
    border: 1px solid #ddd;
    padding: 8px;
}

th {
    background: #eee;
}

td {
    text-align: right;
}

td.texto {
    text-align: left;
}

/* Cores */
.caro { background: #f8d7da; }
.medio { background: #fff3cd; }
.barato { background: #d4edda; }
</style>
</head>

<body>

<h1>Painel de Abastecimentos</h1>

<!-- KPIs -->
<div class="kpis">
    <div class="kpi">
        <h3>Total Gasto</h3>
        <p id="totalGasto">R$ 0</p>
    </div>
    <div class="kpi">
        <h3>Total Litros</h3>
        <p id="totalLitros">0</p>
    </div>
    <div class="kpi">
        <h3>Média Litro</h3>
        <p id="mediaLitro">R$ 0</p>
    </div>
</div>

<!-- FILTROS -->
<div class="filtros">
    <input type="text" id="filtroPlaca" placeholder="Placa">
    <input type="text" id="filtroCidade" placeholder="Cidade">
    <input type="date" id="filtroDataInicio">
    <input type="date" id="filtroDataFim">
    <button onclick="baixarExcel()">Excel</button>
</div>

<table>
<thead>
<tr>
    <th>Data</th>
    <th>Hora</th>
    <th>Placa</th>
    <th>Posto</th>
    <th>Cidade</th>
    <th>UF</th>
    <th>Produto</th>
    <th>Litros</th>
    <th>Valor Total</th>
    <th>Valor Unitário</th>
</tr>
</thead>
<tbody id="tabela"></tbody>
</table>

<script>
let dados = [];

/* FORMATOS */
function moeda(v){
    return Number(v||0).toLocaleString("pt-BR",{style:"currency",currency:"BRL"});
}
function numero(v){
    return Number(v||0).toLocaleString("pt-BR",{minimumFractionDigits:2});
}

/* LOAD */
fetch("transacoes.json")
.then(r=>r.json())
.then(j=>{
    dados=j;
    render(dados);
});

/* RENDER */
function render(lista){
    const tb=document.getElementById("tabela");
    tb.innerHTML="";

    let total=0, litros=0;

    lista.forEach(i=>{

        let d="",h="";
        if(i.dataTransacao){
            const dt=new Date(i.dataTransacao);
            d=dt.toISOString().split("T")[0];
            h=dt.toTimeString().split(" ")[0];
        }

        let cor="";
        let vl=Number(i.valorLitro);
        if(vl>=7.5) cor="caro";
        else if(vl>=6.5) cor="medio";
        else cor="barato";

        total+=Number(i.valorTransacao||0);
        litros+=Number(i.litros||0);

        tb.innerHTML+=`
        <tr>
            <td>${d}</td>
            <td>${h}</td>
            <td class="texto">${i.placa||""}</td>
            <td class="texto">${i.nomeReduzidoEstabelecimento||""}</td>
            <td class="texto">${i.nomeCidade||""}</td>
            <td>${i.uf||""}</td>
            <td class="texto">${i.tipoCombustivel||""}</td>
            <td>${numero(i.litros)}</td>
            <td>${moeda(i.valorTransacao)}</td>
            <td class="${cor}">${moeda(i.valorLitro)}</td>
        </tr>`;
    });

    /* KPIs */
    document.getElementById("totalGasto").innerText=moeda(total);
    document.getElementById("totalLitros").innerText=numero(litros);
    document.getElementById("mediaLitro").innerText=moeda(total/litros||0);
}

/* FILTRO */
document.querySelectorAll("input").forEach(i=>{
    i.addEventListener("input",filtrar);
});

function filtrar(){
    const p=filtroPlaca.value.toLowerCase();
    const c=filtroCidade.value.toLowerCase();
    const di=filtroDataInicio.value;
    const df=filtroDataFim.value;

    const f=dados.filter(i=>{
        let ok=true;

        if(p && !(i.placa||"").toLowerCase().includes(p)) ok=false;
        if(c && !(i.nomeCidade||"").toLowerCase().includes(c)) ok=false;

        if(i.dataTransacao){
            const d=i.dataTransacao.split("T")[0];
            if(di && d<di) ok=false;
            if(df && d>df) ok=false;
        }

        return ok;
    });

    render(f);
}

/* EXCEL */
function baixarExcel(){
    let t=document.querySelector("table").outerHTML;
    let blob=new Blob(["\ufeff",t],{type:"application/vnd.ms-excel"});
    let a=document.createElement("a");
    a.href=URL.createObjectURL(blob);
    a.download="relatorio.xls";
    a.click();
}
</script>

</body>
</html>
