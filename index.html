<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BI | Gestão de Abastecimento | PizzattoLog</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@700&family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/choices.js/public/assets/styles/choices.min.css" />
<script src="https://cdn.jsdelivr.net/npm/choices.js/public/assets/scripts/choices.min.js"></script>
<style>
    :root { --bg-main: #0b0f19; --bg-card: #111827; --bg-input: #1e293b; --pizzatto-red: #dc2626; --pizzatto-orange: #f97316; --text-primary: #f8fafc; --text-secondary: #94a3b8; --border: #334155; --success: #10b981; --danger: #f87171; --blue: #3b82f6; }
    body { font-family: 'Inter', sans-serif; margin: 0; background: var(--bg-main); color: var(--text-primary); }
    .container { padding: 20px; max-width: 1600px; margin: auto; }
    #tela-login { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: var(--bg-main); display: flex; align-items: center; justify-content: center; z-index: 99999; }
    .login-box { background: var(--bg-card); padding: 40px; border-radius: 16px; border: 1px solid var(--border); text-align: center; width: 400px; }
    .login-logo { background: white; padding: 15px; border-radius: 12px; margin-bottom: 20px; display: inline-block; }
    .login-box input { width: 100%; padding: 14px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg-input); color: white; margin-bottom: 15px; box-sizing: border-box; text-align: center; }
    .login-box button { width: 100%; background: var(--pizzatto-red); color: white; border: none; padding: 14px; border-radius: 8px; font-weight: bold; cursor: pointer; }
    header { background: var(--bg-card); padding: 20px; border-radius: 12px; margin-bottom: 20px; border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; }
    .logo-relatorio { height: 50px; background: white; padding: 5px 15px; border-radius: 8px; }
    .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
    .tabs button { background: var(--bg-input); border: 1px solid var(--border); color: var(--text-secondary); padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; }
    .tabs button.active { background: var(--pizzatto-red); color: white; }
    .filtros { display: flex; flex-wrap: wrap; gap: 10px; background: var(--bg-card); padding: 15px; border-radius: 12px; margin-bottom: 20px; border: 1px solid var(--border); }
    .filtro-box { flex: 1; min-width: 150px; }
    input, select { background: var(--bg-input); border: 1px solid var(--border); color: white; padding: 8px; border-radius: 6px; width: 100%; box-sizing: border-box; }
    .kpis { display: flex; gap: 15px; margin-bottom: 20px; }
    .kpi { background: var(--bg-card); padding: 20px; border-radius: 12px; flex: 1; border-left: 5px solid var(--pizzatto-orange); border-top: 1px solid var(--border); }
    .kpi label { font-size: 11px; color: var(--text-secondary); text-transform: uppercase; font-weight: bold; }
    .kpi span { display: block; font-size: 22px; font-weight: 800; margin-top: 5px; }
    .table-container { background: var(--bg-card); border-radius: 12px; border: 1px solid var(--border); overflow: hidden; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th { background: #1e293b; color: #94a3b8; text-align: left; padding: 12px; text-transform: uppercase; font-size: 11px; }
    td { padding: 12px; border-bottom: 1px solid var(--border); }
    .badge { padding: 3px 8px; border-radius: 4px; font-size: 10px; font-weight: 800; display: inline-block; margin-top: 4px; }
    .badge-origem-frota { background: rgba(59, 130, 246, 0.2); color: #60a5fa; border: 1px solid #3b82f6; }
    .badge-origem-agregado { background: rgba(249, 115, 22, 0.2); color: #fb923c; border: 1px solid #f97316; }
    .badge-tlog { background: #1e293b; color: #94a3b8; border: 1px solid var(--border); font-size: 9px; }
    .num { text-align: right; font-family: monospace; }
</style>
</head>
<body>

<div id="tela-login">
    <div class="login-box">
        <div class="login-logo"><img src="logo.png" alt="PizzattoLog" onerror="this.style.display='none'"></div>
        <h2 style="margin: 0 0 10px 0;">BI PizzattoLog</h2>
        <p style="color: var(--text-secondary); font-size: 14px; margin-bottom: 20px;">Acesso Restrito</p>
        <input type="password" id="inputSenha" placeholder="Senha">
        <button onclick="logar()">Entrar</button>
    </div>
</div>

<div class="container" id="app" style="display:none;">
    <header>
        <img src="logo.png" class="logo-relatorio" onerror="this.style.display='none'">
        <div style="margin-left: 20px;">
            <h1 style="margin:0; font-size: 24px;">Painel de Abastecimento</h1>
            <span id="ultimaAtu" style="font-size: 11px; color: var(--success); font-weight: bold;"></span>
        </div>
    </header>

    <div class="tabs">
        <button class="active">Abastecimentos</button>
        <button onclick="baixarExcel()" style="margin-left: auto; background: var(--success); color: white; border:none;">Download Excel</button>
    </div>

    <div class="filtros">
        <div class="filtro-box"><select id="fOrigem" multiple></select></div>
        <div class="filtro-box"><input id="fPlaca" placeholder="Placa..."></div>
        <div class="filtro-box"><input id="fCidade" placeholder="Cidade..."></div>
        <div class="filtro-box"><input type="date" id="fD1"></div>
        <div class="filtro-box"><input type="date" id="fD2"></div>
    </div>

    <div class="kpis">
        <div class="kpi"><label>Total Investido</label><span id="kTotal">R$ 0,00</span></div>
        <div class="kpi"><label>Litros</label><span id="kLitros">0,00</span></div>
        <div class="kpi"><label>Média Preço/L</label><span id="kMedia">R$ 0,00</span></div>
    </div>

    <div class="table-container">
        <table>
            <thead><tr><th>Data</th><th>Placa</th><th>Tipo</th><th>Posto</th><th>Cidade</th><th>UF</th><th>Produto</th><th class="num">Litros</th><th class="num">Total</th><th class="num">Preço/L</th></tr></thead>
            <tbody id="lista"></tbody>
        </table>
    </div>
</div>

<script>
    let dados = []; let escolhas = {};
    const fmtM = v => "R$ " + Number(v).toLocaleString('pt-BR', {minimumFractionDigits:2});
    const fmtN = v => Number(v).toLocaleString('pt-BR', {minimumFractionDigits:2});

    function logar() {
        if(document.getElementById('inputSenha').value === 'Pizzatto2026') {
            document.getElementById('tela-login').style.display = 'none';
            document.getElementById('app').style.display = 'block';
            carregar();
        }
    }

    function carregar() {
        fetch('transacoes.json?v=' + Date.now()).then(r => r.json()).then(j => {
            dados = j;
            prepararFiltros();
            filtrar();
        });
    }

    function prepararFiltros() {
        let origens = [...new Set(dados.map(d => d.origemConta))];
        const sel = document.getElementById('fOrigem');
        origens.forEach(o => sel.innerHTML += `<option value="${o}">${o}</option>`);
        escolhas.origem = new Choices(sel, {removeItemButton: true, itemSelectText: ''});
        sel.addEventListener('change', filtrar);
        ['fPlaca', 'fCidade', 'fD1', 'fD2'].forEach(id => document.getElementById(id).addEventListener('input', filtrar));
    }

    function filtrar() {
        const p = document.getElementById('fPlaca').value.toUpperCase();
        const c = document.getElementById('fCidade').value.toUpperCase();
        const d1 = document.getElementById('fD1').value;
        const d2 = document.getElementById('fD2').value;
        const selOrigens = escolhas.origem.getValue(true);

        const filtrados = dados.filter(d => {
            let ok = true;
            if(p && !d.placa.includes(p)) ok = false;
            if(c && !(d.nomeCidade||"").includes(c)) ok = false;
            if(d1 && d.dataTransacao.split('T')[0] < d1) ok = false;
            if(d2 && d.dataTransacao.split('T')[0] > d2) ok = false;
            if(selOrigens.length && !selOrigens.includes(d.origemConta)) ok = false;
            return ok;
        });

        desenhar(filtrados);
    }

    function desenhar(lista) {
        const corpo = document.getElementById('lista'); corpo.innerHTML = '';
        let tV = 0, tL = 0;

        lista.forEach(d => {
            tV += d.valorTransacao; tL += d.litros;
            const bO = d.origemConta === 'FROTA' ? 'badge-origem-frota' : 'badge-origem-agregado';
            corpo.innerHTML += `<tr>
                <td>${d.dataTransacao.replace('T', ' ')}</td>
                <td><strong>${d.placa}</strong></td>
                <td><span class="badge badge-tlog">${d.tipoFrota||'S/T'}</span><br><span class="badge ${bO}">${d.origemConta}</span></td>
                <td>${d.nomeReduzidoEstabelecimento}</td>
                <td>${d.nomeCidade||'-'}</td>
                <td>${d.uf}</td>
                <td>${d.tipoCombustivel}</td>
                <td class="num">${fmtN(d.litros)}</td>
                <td class="num">${fmtM(d.valorTransacao)}</td>
                <td class="num">${fmtM(d.valorLitro)}</td>
            </tr>`;
        });

        document.getElementById('kTotal').innerText = fmtM(tV);
        document.getElementById('kLitros').innerText = fmtN(tL);
        document.getElementById('kMedia').innerText = fmtM(tV/tL || 0);
    }

    function baixarExcel() {
        let csv = "DATA;PLACA;TIPO;ORIGEM;POSTO;CIDADE;UF;VALOR;LITROS\n";
        dados.forEach(d => {
            csv += `${d.dataTransacao};${d.placa};${d.tipoFrota};${d.origemConta};${d.nomeReduzidoEstabelecimento};${d.nomeCidade};${d.uf};${d.valorTransacao};${d.litros}\n`;
        });
        const blob = new Blob([csv], {type: 'text/csv'});
        const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'abastecimentos.csv'; a.click();
    }
</script>
</body>
</html>
