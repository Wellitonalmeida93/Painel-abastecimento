<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PizzattoLog | BI Abastecimento</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700;800&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
    :root {
        --bg-main: #0b0f19;
        --bg-card: #111827;
        --pizzatto-red: #dc2626; 
        --pizzatto-orange: #f97316; 
        --text-primary: #f8fafc;
        --text-secondary: #94a3b8;
        --border: #1f2937;
    }

    body { font-family: 'Inter', sans-serif; margin: 0; background: var(--bg-main); color: var(--text-primary); overflow-x: hidden; }
    .container { padding: 20px; max-width: 1600px; margin: auto; }

    /* CABEÇALHO PROFISSIONAL */
    header {
        background: var(--bg-card); padding: 20px; border-radius: 12px; margin-bottom: 25px;
        display: flex; justify-content: center; align-items: center; border: 1px solid var(--border);
        box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
    }
    .logo-container { 
        background: white; padding: 10px 20px; border-radius: 10px; 
        display: flex; align-items: center; box-shadow: 0 4px 15px rgba(249, 115, 22, 0.2);
    }
    .logo-relatorio { height: 50px; width: auto; }
    .cabecalho-conteudo { display: flex; align-items: center; gap: 25px; }
    .icon-bomba { color: var(--pizzatto-orange); width: 32px; height: 32px; }
    .bi-destaque { color: var(--pizzatto-red); font-weight: 800; font-family: 'Poppins'; }

    /* NAVEGAÇÃO */
    .tabs { margin-bottom: 20px; display: flex; gap: 10px; }
    .tabs button { 
        background: var(--pizzatto-red); border: none; color: white; padding: 12px 22px; 
        border-radius: 8px; cursor: pointer; font-weight: bold; display: flex; align-items: center; gap: 10px;
        transition: 0.3s;
    }
    .tabs button:hover { background: #b91c1c; transform: translateY(-2px); }
    .tabs button.active { background: #991b1b; border-bottom: 3px solid var(--pizzatto-orange); }

    /* DASHBOARD */
    .kpis { display: flex; gap: 15px; margin-bottom: 20px; }
    .kpi { 
        background: var(--bg-card); padding: 20px; border-radius: 12px; flex: 1; 
        border-left: 5px solid var(--pizzatto-orange); border-top: 1px solid var(--border);
    }
    .kpi label { font-size: 11px; color: var(--text-secondary); text-transform: uppercase; font-weight: 700; letter-spacing: 1px; }
    .kpi span { font-size: 24px; font-weight: 800; display: block; margin-top: 5px; }

    .table-container { background: var(--bg-card); border-radius: 12px; border: 1px solid var(--border); overflow: hidden; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th { background: #1f2937; padding: 14px; color: #cbd5e1; text-align: left; text-transform: uppercase; font-size: 11px; letter-spacing: 1px; }
    td { padding: 12px; border-bottom: 1px solid var(--border); }
    .num { text-align: right; font-family: 'Courier New', monospace; font-weight: bold; }
    .caro { color: #f87171; font-weight: 800; }

    /* GERENCIAL */
    .grid-gerencial { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; }
    .card-chart { background: var(--bg-card); padding: 25px; border-radius: 12px; border: 1px solid var(--border); }
    .card-chart h3 { font-size: 16px; margin: 0 0 20px 0; color: var(--text-primary); border-bottom: 1px solid var(--border); padding-bottom: 12px; display: flex; align-items: center; gap: 10px; }

    iframe { width: 100%; height: 78vh; border: none; border-radius: 12px; background: white; }
</style>
</head>
<body>

<div class="container">
    <header>
        <div class="cabecalho-conteudo">
            <div class="logo-container">
                <img src="logo.png?v=2" alt="PizzattoLog" class="logo-relatorio">
            </div>
            <div class="cabecalho-titulos">
                <h1 style="margin:0;"><i data-lucide="fuel" class="icon-bomba"></i> <span class="bi-destaque">BI</span> Painel de Abastecimento</h1>
                <span style="font-size: 12px; color: var(--text-secondary); letter-spacing: 3px; text-transform: uppercase; font-weight: 600;">PizzattoLog Transportes</span>
            </div>
        </div>
    </header>

    <div class="tabs">
        <button id="btn-operacional" class="active" onclick="mostrarAba('operacional')"><i data-lucide="layout-dashboard"></i> Abastecimentos</button>
        <button id="btn-gerencial" onclick="mostrarAba('gerencial')"><i data-lucide="pie-chart"></i> KPI Gerencial</button>
        <button style="background: #10b981;" onclick="mostrarAba('sheets')"><i data-lucide="table-2"></i> Valores Diesel (Sheets)</button>
    </div>

    <div id="aba-operacional">
        <div class="kpis">
            <div class="kpi"><label>Total Investido</label><span id="total">R$ 0,00</span></div>
            <div class="kpi"><label>Litros Abastecidos</label><span id="litros">0,00</span></div>
            <div class="kpi"><label>Média R$ / Litro</label><span id="media">R$ 0,00</span></div>
        </div>
        <div class="table-container">
            <table>
                <thead>
                    <tr><th>Data</th><th>Placa</th><th>Posto</th><th>Produto</th><th class="num">Litros</th><th class="num">Valor Total</th><th class="num">Vl. Unitário</th></tr>
                </thead>
                <tbody id="tabela"></tbody>
            </table>
        </div>
    </div>

    <div id="aba-gerencial" style="display:none;">
        <div class="grid-gerencial">
            <div class="card-chart">
                <h3><i data-lucide="map-pin" style="color:var(--pizzatto-orange)"></i> Gasto por UF (Ordenado)</h3>
                <div style="height: 350px;"><canvas id="graficoUF"></canvas></div>
            </div>
            <div class="card-chart">
                <h3><i data-lucide="alert-triangle" style="color:var(--pizzatto-red)"></i> Top 10 Preços Unitários Mais Altos</h3>
                <table style="width:100%">
                    <thead>
                        <tr><th>Placa</th><th>Produto</th><th class="num">Preço/L</th></tr>
                    </thead>
                    <tbody id="listaMaioresPrecos"></tbody>
                </table>
            </div>
        </div>
        <div class="grid-gerencial" style="grid-template-columns: 1fr; margin-top:20px;">
            <div class="card-chart">
                <h3><i data-lucide="award" style="color:var(--pizzatto-orange)"></i> Ranking de Postos (Maiores Gastos)</h3>
                <div style="height: 400px;"><canvas id="graficoPostos"></canvas></div>
            </div>
        </div>
    </div>

    <div id="aba-sheets" style="display:none;">
        <iframe src="https://docs.google.com/spreadsheets/d/e/2PACX-1vTMrknZbVmnLdLOW4knDIW4Wmjw6CMUyttdpw1c4SnxJP9HjmQcsH0heNOShzOrdHsOs7MDQuhZazcI/pubhtml?widget=true&amp;headers=false"></iframe>
    </div>
</div>

<script>
    let dados = [];
    let charts = {};

    const formatMoeda = v => "R$ " + Number(v || 0).toLocaleString("pt-BR", {minimumFractionDigits: 2, maximumFractionDigits: 2});

    fetch("transacoes.json").then(r => r.json()).then(j => {
        dados = j;
        render(dados);
        lucide.createIcons();
    });

    function render(lista) {
        let tb = document.getElementById("tabela");
        tb.innerHTML = "";
        let total = 0, litros = 0;

        lista.forEach(i => {
            total += Number(i.valorTransacao || 0);
            litros += Number(i.litros || 0);
            let vl = Number(i.valorLitro || 0);
            tb.innerHTML += `<tr>
                <td>${(i.dataTransacao || '').split('T')[0]}</td>
                <td><strong style="color:var(--pizzatto-orange)">${i.placa}</strong></td>
                <td><small>${i.nomeReduzidoEstabelecimento}</small></td>
                <td>${i.tipoCombustivel || '-'}</td>
                <td class="num">${Number(i.litros).toFixed(2)}</td>
                <td class="num">${formatMoeda(i.valorTransacao)}</td>
                <td class="num ${vl > 6.8 ? 'caro' : ''}">${formatMoeda(vl)}</td>
            </tr>`;
        });
        document.getElementById("total").innerText = formatMoeda(total);
        document.getElementById("litros").innerText = litros.toLocaleString("pt-BR", {minimumFractionDigits: 2});
        document.getElementById("media").innerText = formatMoeda(total / litros || 0);
    }

    function mostrarAba(a) {
        ['aba-operacional', 'aba-gerencial', 'aba-sheets'].forEach(id => document.getElementById(id).style.display = 'none');
        document.getElementById('aba-' + a).style.display = 'block';
        document.querySelectorAll('.tabs button').forEach(b => b.classList.remove('active'));
        if(event) event.currentTarget.classList.add('active');
        if (a === 'gerencial') renderGerencial();
    }

    function renderGerencial() {
        // 1. Gráfico UF Ordenado Decrescente
        let ufsRaw = {};
        dados.forEach(i => { if(i.uf) ufsRaw[i.uf] = (ufsRaw[i.uf] || 0) + Number(i.valorTransacao); });
        let ufsSorted = Object.entries(ufsRaw).sort((a,b) => b[1] - a[1]);
        updateChart('graficoUF', 'doughnut', ufsSorted.map(x=>x[0]), ufsSorted.map(x=>x[1]), ['#dc2626','#f97316','#f59e0b','#10b981','#3b82f6','#6366f1']);

        // 2. Top 10 Preços Unitários Elevados + Produto
        let maioresP = [...dados].sort((a,b) => Number(b.valorLitro || 0) - Number(a.valorLitro || 0)).slice(0, 10);
        document.getElementById("listaMaioresPrecos").innerHTML = maioresP.map(i => `
            <tr>
                <td><strong>${i.placa}</strong></td>
                <td><span style="color:var(--pizzatto-orange); font-size:11px;">${i.tipoCombustivel || '-'}</span><br><small style="color:#64748b">${(i.nomeReduzidoEstabelecimento || '').substring(0,20)}</small></td>
                <td class="num caro">${formatMoeda(i.valorLitro)}</td>
            </tr>
        `).join("");

        // 3. Postos Ranking (Maiores Gastos)
        let pRank = {};
        dados.forEach(i => { pRank[i.nomeReduzidoEstabelecimento] = (pRank[i.nomeReduzidoEstabelecimento] || 0) + Number(i.valorTransacao); });
        let topP = Object.entries(pRank).sort((a,b) => b[1] - a[1]).slice(0, 10);
        updateChart('graficoPostos', 'bar', topP.map(x=>x[0]), topP.map(x=>x[1]), '#f97316', 'y');
    }

    function updateChart(id, type, labels, data, colors, axis = 'x') {
        if (charts[id]) charts[id].destroy();
        charts[id] = new Chart(document.getElementById(id), {
            type: type,
            data: { labels: labels, datasets: [{ data: data, backgroundColor: colors, borderColor: colors, tension: 0.3 }] },
            options: { 
                indexAxis: axis, maintainAspectRatio: false,
                plugins: { 
                    legend: { 
                        display: type === 'doughnut', 
                        position: 'right', 
                        labels: { color: '#94a3b8', font: {size: 11, weight: 'bold'}, padding: 15 } 
                    } 
                },
                scales: type === 'bar' ? { 
                    y: { ticks: { color: '#94a3b8' }, grid: { color: '#1f2937' } }, 
                    x: { ticks: { color: '#94a3b8' }, grid: { display: false } } 
                } : {}
            }
        });
    }
</script>
</body>
</html>
