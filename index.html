<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Painel BI Abastecimento</title>

<style>
body {
    font-family: Arial;
    background: #0f172a;
    color: #fff;
    padding: 20px;
}

h1 {
    margin-bottom: 10px;
}

.filtros {
    margin-bottom: 15px;
}

input, select, button {
    padding: 8px;
    margin-right: 10px;
    border-radius: 6px;
    border: none;
}

button {
    background: #2563eb;
    color: white;
    cursor: pointer;
}

.cards {
    display: flex;
    gap: 20px;
    margin-bottom: 20px;
}

.card {
    background: #1e293b;
    padding: 15px;
    border-radius: 10px;
    flex: 1;
}

table {
    width: 100%;
    border-collapse: collapse;
    background: #1e293b;
}

th, td {
    padding: 8px;
    border-bottom: 1px solid #334155;
}

th {
    background: #334155;
}

td {
    text-align: right;
}

td.texto {
    text-align: left;
}
</style>
</head>

<body>

<h1>📊 Painel BI Abastecimento</h1>

<div class="cards">
    <div class="card">Total: <span id="total">0</span></div>
    <div class="card">Litros: <span id="litros">0</span></div>
    <div class="card">Média: <span id="media">0</span></div>
</div>

<div class="filtros">
    <input id="placa" placeholder="Placa">
    <input id="cidade" placeholder="Cidade">

    <select id="posto"></select>
    <select id="uf"></select>
    <select id="produto"></select>

    <button onclick="filtrar()">Filtrar</button>
    <button onclick="exportarExcel()">Excel</button>
</div>

<table>
<thead>
<tr>
    <th>Data</th>
    <th>Hora</th>
    <th>Placa</th>
    <th>Posto</th>
    <th>Cidade</th>
    <th>UF</th>
    <th>Produto</th>
    <th>Litros</th>
    <th>Total</th>
    <th>Litro</th>
</tr>
</thead>
<tbody id="tabela"></tbody>
</table>

<script>
let dados = [];
let dadosFiltrados = [];

// FORMATAÇÕES
function moeda(v) {
    return Number(v || 0).toLocaleString("pt-BR", {style:"currency", currency:"BRL"});
}

function numero(v) {
    return Number(v || 0).toLocaleString("pt-BR", {minimumFractionDigits:2});
}

// BUSCAR API
fetch("/api/transacoes")
.then(r => r.json())
.then(json => {
    console.log("API:", json);

    dados = json.dados || [];
    dadosFiltrados = dados;

    popularFiltros();
    render();
});

// FILTROS DROPDOWN
function popularFiltros() {
    preencher("posto", [...new Set(dados.map(x => x.nomeReduzidoEstabelecimento))]);
    preencher("uf", [...new Set(dados.map(x => x.uf))]);
    preencher("produto", [...new Set(dados.map(x => x.tipoCombustivel))]);
}

function preencher(id, lista) {
    const el = document.getElementById(id);
    el.innerHTML = '<option value="">Todos</option>';
    lista.forEach(v => {
        if(v) el.innerHTML += `<option>${v}</option>`;
    });
}

// FILTRAR
function filtrar() {
    const placa = document.getElementById("placa").value.toLowerCase();
    const cidade = document.getElementById("cidade").value.toLowerCase();
    const posto = document.getElementById("posto").value;
    const uf = document.getElementById("uf").value;
    const produto = document.getElementById("produto").value;

    dadosFiltrados = dados.filter(x =>
        (x.placa || "").toLowerCase().includes(placa) &&
        (x.nomeCidade || "").toLowerCase().includes(cidade) &&
        (!posto || x.nomeReduzidoEstabelecimento === posto) &&
        (!uf || x.uf === uf) &&
        (!produto || x.tipoCombustivel === produto)
    );

    render();
}

// RENDER
function render() {
    const tabela = document.getElementById("tabela");
    tabela.innerHTML = "";

    let total = 0;
    let litros = 0;

    dadosFiltrados.forEach(x => {
        let d = new Date(x.dataTransacao);
        let data = d.toLocaleDateString("pt-BR");
        let hora = d.toLocaleTimeString("pt-BR");

        total += Number(x.valorTransacao || 0);
        litros += Number(x.litros || 0);

        tabela.innerHTML += `
        <tr>
            <td>${data}</td>
            <td>${hora}</td>
            <td class="texto">${x.placa || ""}</td>
            <td class="texto">${x.nomeReduzidoEstabelecimento || ""}</td>
            <td class="texto">${x.nomeCidade || ""}</td>
            <td>${x.uf || ""}</td>
            <td class="texto">${x.tipoCombustivel || ""}</td>
            <td>${numero(x.litros)}</td>
            <td>${moeda(x.valorTransacao)}</td>
            <td>${moeda(x.valorLitro)}</td>
        </tr>`;
    });

    document.getElementById("total").innerText = moeda(total);
    document.getElementById("litros").innerText = numero(litros);
    document.getElementById("media").innerText = moeda(total / (litros || 1));
}

// EXPORTAR EXCEL
function exportarExcel() {
    let csv = "Data,Hora,Placa,Posto,Cidade,UF,Produto,Litros,Total,Valor Litro\n";

    dadosFiltrados.forEach(x => {
        let d = new Date(x.dataTransacao);

        csv += `${d.toLocaleDateString("pt-BR")},${d.toLocaleTimeString("pt-BR")},${x.placa},${x.nomeReduzidoEstabelecimento},${x.nomeCidade},${x.uf},${x.tipoCombustivel},${x.litros},${x.valorTransacao},${x.valorLitro}\n`;
    });

    let blob = new Blob([csv], {type: "text/csv"});
    let a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "abastecimentos.csv";
    a.click();
}
</script>

</body>
</html>
