<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BI | Gestão de Abastecimento | PizzattoLog</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@700&family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/choices.js/public/assets/styles/choices.min.css" />
<script src="https://cdn.jsdelivr.net/npm/choices.js/public/assets/scripts/choices.min.js"></script>

<style>
    :root {
        --bg-main: #0b0f19; --bg-card: #111827; --bg-input: #1e293b; 
        --pizzatto-red: #dc2626; --pizzatto-orange: #f97316; 
        --text-primary: #f8fafc; --text-secondary: #94a3b8;
        --border: #334155; --success: #10b981; --danger: #f87171;
    }

    body { font-family: 'Inter', sans-serif; margin: 0; background: var(--bg-main); color: var(--text-primary); overflow-x: hidden; }
    .container { padding: 20px; max-width: 1600px; margin: auto; }
    
    /* LOGIN */
    #tela-login { position: fixed; inset: 0; background: var(--bg-main); display: flex; align-items: center; justify-content: center; z-index: 99999; }
    .login-box { background: var(--bg-card); padding: 40px; border-radius: 16px; border: 1px solid var(--border); text-align: center; width: 100%; max-width: 400px; }
    .login-box input { width: 100%; padding: 14px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg-input); color: white; margin-bottom: 15px; text-align: center; box-sizing: border-box; }
    .login-box button { width: 100%; background: var(--pizzatto-red); color: white; border: none; padding: 14px; border-radius: 8px; font-weight: bold; cursor: pointer; }

    /* HEADER */
    header { background: var(--bg-card); padding: 25px; border-radius: 12px; margin-bottom: 25px; display: flex; align-items: center; border: 1px solid var(--border); }
    .logo-container { background: white; padding: 10px 20px; border-radius: 10px; margin-right: 20px; }
    
    /* TABS */
    .tabs { margin-bottom: 20px; display: flex; gap: 8px; }
    .tabs button { background: var(--bg-input); border: 1px solid var(--border); color: var(--text-secondary); padding: 12px 22px; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; }
    .tabs button.active { background: var(--pizzatto-red); color: white; border-color: var(--pizzatto-red); }

    /* DASHBOARD */
    .kpis { display: flex; gap: 15px; margin-bottom: 20px; flex-wrap: wrap; }
    .kpi { background: var(--bg-card); padding: 20px; border-radius: 12px; flex: 1; min-width: 200px; border: 1px solid var(--border); border-left: 5px solid var(--pizzatto-orange); }
    .kpi label { font-size: 11px; color: var(--text-secondary); text-transform: uppercase; font-weight: 700; }
    .kpi span { font-size: 24px; font-weight: 800; display: block; margin-top: 5px; }

    .filtros { display: flex; flex-wrap: wrap; gap: 15px; background: var(--bg-card); padding: 20px; border-radius: 12px; margin-bottom: 20px; border: 1px solid var(--border); }
    .filtro-box { flex: 1; min-width: 140px; }
    input[type="date"], input[list] { height: 38px; width: 100%; padding: 0 14px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg-input); color: white; }

    /* TABELA */
    .table-container { overflow-x: auto; background: var(--bg-card); border-radius: 12px; border: 1px solid var(--border); }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th, td { padding: 12px 15px; border-bottom: 1px solid var(--border); text-align: left; }
    th { background: #1e293b; color: #94a3b8; font-weight: 600; text-transform: uppercase; font-size: 11px; }
    .num { text-align: right; font-family: monospace; font-size: 14px; }

    /* GRÁFICOS */
    .card-chart { background: var(--bg-card); padding: 25px; border-radius: 12px; border: 1px solid var(--border); margin-bottom: 20px; }
    .grid-gerencial { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }

    .btn-excel { background: var(--success); color: white; border: none; padding: 0 20px; height: 38px; border-radius: 8px; font-weight: 600; cursor: pointer; margin-left: auto; }
</style>
</head>
<body>

<div id="tela-login">
    <div class="login-box">
        <h2>Acesso PizzattoLog</h2>
        <input type="password" id="inputSenha" placeholder="Senha">
        <button onclick="verificarSenha()">Entrar</button>
    </div>
</div>

<div class="container" id="app-container" style="display: none;">
    <header>
        <div class="logo-container"><img src="logo.png" style="height: 40px;" onerror="this.parentElement.style.display='none'"></div>
        <h1>Painel de Abastecimento 2026</h1>
        <button class="btn-excel" onclick="baixarExcel()"><i data-lucide="download"></i> Exportar Excel</button>
    </header>

    <div class="tabs">
        <button id="btn-operacional" class="active" onclick="mostrarAba('operacional')">Operacional</button>
        <button id="btn-gerencial" onclick="mostrarAba('gerencial')">KPI Gerencial</button>
        <button id="btn-intel" onclick="mostrarAba('intel')">Inteligência</button>
    </div>

    <div class="filtros">
        <div class="filtro-box"><input id="filtroPlaca" placeholder="Filtrar Placa..."></div>
        <div class="filtro-box"><input id="filtroCidade" placeholder="Filtrar Cidade..."></div>
        <div class="filtro-box"><input type="date" id="fD1"></div>
        <div class="filtro-box"><input type="date" id="fD2"></div>
        <div class="filtro-box"><select id="fPosto" multiple></select></div>
        <div class="filtro-box"><select id="fUF" multiple></select></div>
    </div>

    <div id="aba-operacional">
        <div class="kpis">
            <div class="kpi"><label>Total Gasto</label><span id="total">R$ 0,00</span></div>
            <div class="kpi"><label>Litros</label><span id="litros">0,00 L</span></div>
            <div class="kpi"><label>Média R$/L</label><span id="media">R$ 0,00</span></div>
        </div>
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Data/Hora</th>
                        <th>Placa</th>
                        <th>Posto</th>
                        <th>Cidade</th>
                        <th>UF</th>
                        <th>Produto</th>
                        <th class="num">Litros</th>
                        <th class="num">Total</th>
                        <th class="num">Vl. Litro</th>
                    </tr>
                </thead>
                <tbody id="tabela"></tbody>
            </table>
        </div>
    </div>

    <div id="aba-gerencial" style="display:none;">
        <div class="card-chart"><h3>Evolução Diária (R$)</h3><div style="height: 300px;"><canvas id="graficoEvolucao"></canvas></div></div>
        <div class="grid-gerencial">
            <div class="card-chart"><h3>Gastos por Estado</h3><div style="height: 300px;"><canvas id="graficoUF"></canvas></div></div>
            <div class="card-chart"><h3>Ranking de Postos</h3><div style="height: 300px;"><canvas id="graficoPostos"></canvas></div></div>
        </div>
    </div>

    <div id="aba-intel" style="display:none;">
        <div class="card-chart">
            <h2>Análise de Variação de Preços</h2>
            <p id="resumoIntel">Carregando inteligência de mercado...</p>
        </div>
    </div>
</div>

<script>
    lucide.createIcons();
    let dadosFull = []; let dadosFiltrados = []; let choices = {};

    function verificarSenha() {
        if(document.getElementById('inputSenha').value === 'Pizzatto_&3gm5zQ742i') {
            document.getElementById('tela-login').style.display = 'none';
            document.getElementById('app-container').style.display = 'block';
            iniciar();
        } else { alert("Senha incorreta"); }
    }

    function iniciar() {
        fetch('transacoes.json?v=' + Date.now()).then(r => r.json()).then(j => {
            dadosFull = j;
            prepararFiltros();
            filtrar();
        });
    }

    function prepararFiltros() {
        const postos = [...new Set(dadosFull.map(d => d.nomeReduzidoEstabelecimento))];
        const ufs = [...new Set(dadosFull.map(d => d.uf))];
        
        const selP = document.getElementById('fPosto');
        postos.sort().forEach(p => selP.innerHTML += `<option value="${p}">${p}</option>`);
        choices.posto = new Choices(selP, {removeItemButton: true, placeholderValue: 'Postos'});

        const selU = document.getElementById('fUF');
        ufs.sort().forEach(u => selU.innerHTML += `<option value="${u}">${u}</option>`);
        choices.uf = new Choices(selU, {removeItemButton: true, placeholderValue: 'UFs'});

        ['filtroPlaca', 'filtroCidade', 'fD1', 'fD2'].forEach(id => {
            document.getElementById(id).addEventListener('input', filtrar);
        });
        selP.addEventListener('change', filtrar);
        selU.addEventListener('change', filtrar);
    }

    function filtrar() {
        const p = document.getElementById('filtroPlaca').value.toUpperCase();
        const c = document.getElementById('filtroCidade').value.toUpperCase();
        const d1 = document.getElementById('fD1').value;
        const d2 = document.getElementById('fD2').value;
        const selP = choices.posto.getValue(true);
        const selU = choices.uf.getValue(true);

        dadosFiltrados = dadosFull.filter(d => {
            let ok = true;
            if(p && !d.placa.includes(p)) ok = false;
            if(c && !(d.nomeCidade||"").toUpperCase().includes(c)) ok = false;
            if(d1 && d.dataTransacao.split('T')[0] < d1) ok = false;
            if(d2 && d.dataTransacao.split('T')[0] > d2) ok = false;
            if(selP.length && !selP.includes(d.nomeReduzidoEstabelecimento)) ok = false;
            if(selU.length && !selU.includes(d.uf)) ok = false;
            return ok;
        });

        atualizarTela();
    }

    function atualizarTela() {
        const body = document.getElementById('tabela'); body.innerHTML = '';
        let vT = 0, lT = 0;

        dadosFiltrados.slice(0, 200).forEach(d => {
            vT += d.valorTransacao; lT += d.litros;
            body.innerHTML += `<tr>
                <td>${d.dataTransacao.replace('T', ' ')}</td>
                <td><b>${d.placa}</b></td>
                <td>${d.nomeReduzidoEstabelecimento}</td>
                <td>${d.nomeCidade || '-'}</td>
                <td>${d.uf}</td>
                <td>${d.tipoCombustivel}</td>
                <td class="num">${d.litros.toLocaleString('pt-BR')}</td>
                <td class="num">R$ ${d.valorTransacao.toLocaleString('pt-BR', {minimumFractionDigits:2})}</td>
                <td class="num">R$ ${d.valorLitro.toLocaleString('pt-BR', {minimumFractionDigits:2})}</td>
            </tr>`;
        });

        document.getElementById('total').innerText = "R$ " + vT.toLocaleString('pt-BR', {minimumFractionDigits:2});
        document.getElementById('litros').innerText = lT.toLocaleString('pt-BR') + " L";
        document.getElementById('media').innerText = "R$ " + (vT/lT || 0).toLocaleString('pt-BR', {minimumFractionDigits:2});
        
        if(abaAtual === 'gerencial') renderCharts();
    }

    let abaAtual = 'operacional';
    function mostrarAba(a) {
        abaAtual = a;
        ['aba-operacional', 'aba-gerencial', 'aba-intel'].forEach(id => document.getElementById(id).style.display = 'none');
        document.getElementById('aba-' + a).style.display = 'block';
        document.querySelectorAll('.tabs button').forEach(b => b.classList.remove('active'));
        document.getElementById('btn-' + a).classList.add('active');
        if(a === 'gerencial') renderCharts();
    }

    function renderCharts() {
        // Gráfico Evolução
        const hist = {}; dadosFiltrados.forEach(d => { const dia = d.dataTransacao.split('T')[0]; hist[dia] = (hist[dia]||0) + d.valorTransacao; });
        const labels = Object.keys(hist).sort();
        new Chart(document.getElementById('graficoEvolucao'), { type: 'line', data: { labels, datasets: [{ label: 'R$', data: labels.map(l => hist[l]), borderColor: '#dc2626', fill: true, backgroundColor: 'rgba(220, 38, 38, 0.1)' }] }});
    }

    function baixarExcel() {
        let csv = "\uFEFFData;Placa;Posto;Cidade;UF;Litros;Total\n";
        dadosFiltrados.forEach(d => { csv += `${d.dataTransacao};${d.placa};${d.nomeReduzidoEstabelecimento};${d.nomeCidade};${d.uf};${d.litros};${d.valorTransacao}\n`; });
        const blob = new Blob([csv], {type: 'text/csv;charset=utf-8'});
        const link = document.createElement('a'); link.href = URL.createObjectURL(blob); link.download = 'PizzattoLog_BI.csv'; link.click();
    }
</script>
</body>
</html>
