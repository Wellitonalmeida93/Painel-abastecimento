<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Painel BI Abastecimento</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    font-family: Arial;
    margin: 0;
    background: #0f172a;
    color: #e2e8f0;
}

.container { padding: 20px; }

button {
    background: #2563eb;
    border: none;
    color: white;
    padding: 8px 12px;
    margin-right: 5px;
    border-radius: 5px;
    cursor: pointer;
}

.kpis {
    display: flex;
    gap: 15px;
    margin: 15px 0;
}

.kpi {
    background: #1e293b;
    padding: 15px;
    border-radius: 10px;
    flex: 1;
}

.kpi span {
    font-size: 20px;
    font-weight: bold;
}

.filtros input, .filtros select {
    padding: 6px;
    margin: 5px;
    border-radius: 5px;
    border: none;
}

table {
    width: 100%;
    border-collapse: collapse;
    background: #1e293b;
}

th, td {
    padding: 8px;
    border-bottom: 1px solid #334155;
}

th { background: #334155; }

td { text-align: right; }
.texto { text-align: left; }

.caro { color: #f87171; font-weight: bold; }
.medio { color: #facc15; }
.barato { color: #4ade80; }

ul { padding-left: 20px; }

</style>
</head>

<body>

<div class="container">

<h1>📊 Painel BI Abastecimento</h1>

<button onclick="mostrarAba('operacional')">Operacional</button>
<button onclick="mostrarAba('gerencial')">Gerencial</button>
<button onclick="mostrarAba('planilha')">Planilha</button>

<!-- OPERACIONAL -->
<div id="aba-operacional">

<div class="kpis">
    <div class="kpi">Total<br><span id="total"></span></div>
    <div class="kpi">Litros<br><span id="litros"></span></div>
    <div class="kpi">Média<br><span id="media"></span></div>
</div>

<div class="filtros">
    <input id="filtroPlaca" placeholder="Placa">
    <input id="filtroCidade" placeholder="Cidade">
    <input type="date" id="filtroDataInicio">
    <input type="date" id="filtroDataFim">

    <select id="filtroPosto"><option value="">Posto</option></select>
    <select id="filtroUF"><option value="">UF</option></select>
    <select id="filtroProduto"><option value="">Produto</option></select>

    <button onclick="baixarExcel()">Excel</button>
</div>

<table>
<thead>
<tr>
<th>Data</th><th>Hora</th><th>Placa</th><th>Posto</th>
<th>Cidade</th><th>UF</th><th>Produto</th>
<th>Litros</th><th>Total</th><th>Litro</th>
</tr>
</thead>
<tbody id="tabela"></tbody>
</table>

</div>

<!-- GERENCIAL -->
<div id="aba-gerencial" style="display:none">

<h2>📈 Análise Gerencial</h2>

<canvas id="grafico"></canvas>

<h3>🚚 Consumo por Veículo</h3>
<ul id="veiculos"></ul>

<h3>🏆 Ranking Postos</h3>
<ul id="ranking"></ul>

<h3>🚨 Alertas</h3>
<ul id="alertas"></ul>

</div>

<!-- NOVA ABA PLANILHA -->
<div id="aba-planilha" style="display:none">

<h2>📊 Dados da Planilha</h2>

<button onclick="carregarSheets()">🔄 Atualizar</button>

<table>
    <thead id="cabecalhoSheets"></thead>
    <tbody id="tabelaSheets"></tbody>
</table>

</div>

</div>

<script>
let dados=[];

const moeda=v=>Number(v||0).toLocaleString("pt-BR",{style:"currency",currency:"BRL"});
const numero=v=>Number(v||0).toLocaleString("pt-BR",{minimumFractionDigits:2});

/* LOAD */
fetch("transacoes.json")
.then(r=>r.json())
.then(j=>{
    dados=j;
    preencherFiltros();
    render(dados);
});

/* ABAS */
function mostrarAba(a){
    document.getElementById("aba-operacional").style.display="none";
    document.getElementById("aba-gerencial").style.display="none";
    document.getElementById("aba-planilha").style.display="none";

    document.getElementById("aba-"+a).style.display="block";

    if(a==="gerencial") gerarAnalises();
}

/* FILTROS */
function preencherFiltros(){
    let postos=new Set(),ufs=new Set(),prod=new Set();

    dados.forEach(i=>{
        if(i.nomeReduzidoEstabelecimento) postos.add(i.nomeReduzidoEstabelecimento);
        if(i.uf) ufs.add(i.uf);
        if(i.tipoCombustivel) prod.add(i.tipoCombustivel);
    });

    postos.forEach(p=>filtroPosto.innerHTML+=`<option>${p}</option>`);
    ufs.forEach(u=>filtroUF.innerHTML+=`<option>${u}</option>`);
    prod.forEach(p=>filtroProduto.innerHTML+=`<option>${p}</option>`);
}

document.querySelectorAll("input,select").forEach(i=>i.addEventListener("input",filtrar));

function filtrar(){
    const f=dados.filter(i=>{
        let ok=true;

        if(filtroPlaca.value && !(i.placa||"").toLowerCase().includes(filtroPlaca.value.toLowerCase())) ok=false;
        if(filtroCidade.value && !(i.nomeCidade||"").toLowerCase().includes(filtroCidade.value.toLowerCase())) ok=false;

        if(filtroPosto.value && i.nomeReduzidoEstabelecimento!==filtroPosto.value) ok=false;
        if(filtroUF.value && i.uf!==filtroUF.value) ok=false;
        if(filtroProduto.value && i.tipoCombustivel!==filtroProduto.value) ok=false;

        if(i.dataTransacao){
            let d=i.dataTransacao.split("T")[0];
            if(filtroDataInicio.value && d<filtroDataInicio.value) ok=false;
            if(filtroDataFim.value && d>filtroDataFim.value) ok=false;
        }

        return ok;
    });

    render(f);
}

/* TABELA */
function render(lista){
    let tb=document.getElementById("tabela");
    tb.innerHTML="";

    let total=0,litros=0;

    lista.forEach(i=>{

        let d="", h="";
        if(i.dataTransacao){
            let dt=new Date(i.dataTransacao);
            d=dt.toISOString().split("T")[0];
            h=dt.toTimeString().split(" ")[0];
        }

        let cor="";
        let vl=Number(i.valorLitro||0);
        if(vl>=7.5) cor="caro";
        else if(vl>=6.5) cor="medio";
        else cor="barato";

        total+=Number(i.valorTransacao||0);
        litros+=Number(i.litros||0);

        tb.innerHTML+=`
        <tr>
        <td>${d}</td>
        <td>${h}</td>
        <td class="texto">${i.placa||""}</td>
        <td class="texto">${i.nomeReduzidoEstabelecimento||""}</td>
        <td class="texto">${i.nomeCidade||""}</td>
        <td>${i.uf||""}</td>
        <td class="texto">${i.tipoCombustivel||""}</td>
        <td>${numero(i.litros)}</td>
        <td>${moeda(i.valorTransacao)}</td>
        <td class="${cor}">${moeda(i.valorLitro)}</td>
        </tr>`;
    });

    document.getElementById("total").innerText=moeda(total);
    document.getElementById("litros").innerText=numero(litros);
    document.getElementById("media").innerText=moeda(total/litros||0);
}

/* GOOGLE SHEETS */
function csvParaJson(csv){
    const linhas=csv.split("\n").filter(l=>l.trim()!=="");
    const headers=linhas[0].split(",");

    return linhas.slice(1).map(l=>{
        const valores=l.split(",");
        let obj={};
        headers.forEach((h,i)=>obj[h.trim()]=valores[i]);
        return obj;
    });
}

function carregarSheets(){
    fetch("https://docs.google.com/spreadsheets/d/e/2PACX-1vTMrknZbVmnLdLOW4knDIW4Wmjw6CMUyttdpw1c4SnxJP9HjmQcsH0heNOShzOrdHsOs7MDQuhZazcI/pub?output=csv")
    .then(r=>r.text())
    .then(csv=>{
        const dados=csvParaJson(csv);

        let tabela=document.getElementById("tabelaSheets");
        let cab=document.getElementById("cabecalhoSheets");

        tabela.innerHTML="";
        cab.innerHTML="";

        if(!dados.length) return;

        let headers=Object.keys(dados[0]);

        cab.innerHTML="<tr>"+headers.map(h=>`<th>${h}</th>`).join("")+"</tr>";

        dados.forEach(l=>{
            tabela.innerHTML+=`<tr>${headers.map(h=>`<td>${l[h]||""}</td>`).join("")}</tr>`;
        });
    });
}
</script>

</body>
</html>
