<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BI | Gestão de Abastecimento | PizzattoLog</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@700&family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/choices.js/public/assets/styles/choices.min.css" />
<script src="https://cdn.jsdelivr.net/npm/choices.js/public/assets/scripts/choices.min.js"></script>

<style>
    :root {
        --bg-main: #0b0f19; --bg-card: #111827; --bg-input: #1e293b; 
        --pizzatto-red: #dc2626; --pizzatto-orange: #f97316; 
        --text-primary: #f8fafc; --text-secondary: #94a3b8;
        --border: #334155; --success: #10b981; --danger: #f87171; --blue: #3b82f6;
    }
    body { font-family: 'Inter', sans-serif; margin: 0; background: var(--bg-main); color: var(--text-primary); overflow-x: hidden; }
    .container { padding: 20px; max-width: 1600px; margin: auto; }
    h1, h2, h3 { font-family: 'Poppins', sans-serif; }

    #tela-login { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: var(--bg-main); display: flex; align-items: center; justify-content: center; z-index: 99999; }
    .login-box { background: var(--bg-card); padding: 40px; border-radius: 16px; border: 1px solid var(--border); box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5); text-align: center; width: 100%; max-width: 400px; position: relative; overflow: hidden; }
    .login-box::after { content: ""; position: absolute; left: -50%; top: -100%; width: 200%; height: 200%; background: radial-gradient(circle, rgba(249,115,22,0.1) 0%, rgba(255,255,255,0) 60%); pointer-events: none; }
    .login-logo { background: white; padding: 15px 25px; border-radius: 12px; display: inline-block; margin-bottom: 25px; box-shadow: 0 4px 15px rgba(249, 115, 22, 0.2); }
    .login-logo img { height: 50px; }
    .login-box h2 { margin: 0 0 10px 0; color: var(--text-primary); font-size: 22px; }
    .login-box p { color: var(--text-secondary); font-size: 14px; margin-bottom: 25px; }
    .login-box input { width: 100%; padding: 14px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg-input); color: white; font-size: 16px; text-align: center; outline: none; transition: 0.3s; box-sizing: border-box; margin-bottom: 15px; letter-spacing: 2px;}
    .login-box input:focus { border-color: var(--pizzatto-orange); box-shadow: 0 0 0 2px rgba(249, 115, 22, 0.2); }
    .login-box button { width: 100%; background: var(--pizzatto-red); color: white; border: none; padding: 14px; border-radius: 8px; font-weight: bold; font-size: 16px; cursor: pointer; transition: 0.3s; display: flex; justify-content: center; align-items: center; gap: 10px; z-index: 2; position: relative;}
    .login-box button:hover { background: #b91c1c; transform: translateY(-2px); }
    #msg-erro { color: var(--danger); font-size: 13px; font-weight: bold; margin-bottom: 15px; display: none; }

    header { background: var(--bg-card); padding: 25px; border-radius: 12px; margin-bottom: 25px; display: flex; justify-content: center; align-items: center; border: 1px solid var(--border); box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3); position: relative; overflow: hidden; }
    header::after { content: ""; position: absolute; left: -50%; top: -100%; width: 200%; height: 200%; background: radial-gradient(circle, rgba(249,115,22,0.06) 0%, rgba(255,255,255,0) 70%); pointer-events: none; }
    .cabecalho-conteudo { display: flex; align-items: center; gap: 25px; z-index: 1; }
    .logo-container { background: white; padding: 10px 20px; border-radius: 10px; border: 1px solid var(--border); box-shadow: 0 4px 15px rgba(249, 115, 22, 0.2); }
    .logo-relatorio { height: 60px; width: auto; }
    .cabecalho-titulos { display: flex; flex-direction: column; }
    .cabecalho-titulos h1 { font-size: 30px; font-weight: 700; margin: 0; display: flex; align-items: center; gap: 12px; }
    .icon-bomba { color: var(--pizzatto-orange); width: 32px; height: 32px; }
    .bi-destaque { color: var(--pizzatto-red); font-weight: 800; }
    .cabecalho-subtitulo { font-size: 13px; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 2px; margin-top: 6px; font-weight: 600; }

    .tabs { margin-bottom: 20px; display: flex; gap: 8px; flex-wrap: wrap; }
    .tabs button { background: var(--bg-input); border: none; color: var(--text-secondary); padding: 12px 22px; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 14px; transition: 0.3s; display: flex; align-items: center; gap: 10px; border: 1px solid var(--border); }
    .tabs button:hover { background: #334155; color: white; transform: translateY(-1px); }
    .tabs button.active { background: var(--pizzatto-red); color: white; border-color: var(--pizzatto-red); border-bottom: 3px solid var(--pizzatto-orange); }
    .btn-sheets { background: #064e3b !important; border-color: #065f46 !important; } 
    .btn-sheets:hover { background: #059669 !important; }
    .btn-sheets.active { background: #10b981 !important; border-bottom: 3px solid #047857 !important; color: white !important;}

    .kpis { display: flex; gap: 15px; margin-bottom: 20px; flex-wrap: wrap; }
    .kpi { background: var(--bg-card); padding: 20px; border-radius: 12px; flex: 1; min-width: 200px; border: 1px solid var(--border); border-left: 5px solid var(--pizzatto-orange); }
    .kpi label { font-size: 11px; color: var(--text-secondary); display: block; margin-bottom: 8px; text-transform: uppercase; font-weight: 700; letter-spacing: 1px;}
    .kpi span { font-size: 24px; font-weight: 800; color: var(--text-primary); }

    .filtros { display: flex; flex-wrap: wrap; gap: 15px; background: var(--bg-card); padding: 20px; border-radius: 12px; margin-bottom: 20px; align-items: flex-start; border: 1px solid var(--border); box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
    .filtro-box { flex: 1; min-width: 140px; } 
    .filtros input[type="date"], .filtros input[list] { height: 38px; width: 100%; padding: 0 14px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg-input); color: var(--text-primary); font-size: 13px; outline: none; transition: 0.3s; color-scheme: dark; box-sizing: border-box;}
    .filtros input:focus { border-color: var(--pizzatto-orange); box-shadow: 0 0 0 2px rgba(249, 115, 22, 0.2); }
    
    .btn-excel { background: var(--success); color: white; border: none; padding: 0 20px; height: 38px; border-radius: 8px; font-weight: 600; font-size: 13px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; margin-left: auto; transition: 0.3s; box-sizing: border-box;}
    .btn-excel:hover { background: #059669; transform: translateY(-2px); }

    .choices { margin-bottom: 0 !important; font-size: 13px; color: var(--text-primary); box-sizing: border-box; }
    .choices__inner { background-color: var(--bg-input) !important; border: 1px solid var(--border) !important; border-radius: 8px !important; min-height: 38px !important; padding: 2px 8px !important; display: flex !important; flex-wrap: wrap !important; align-items: center !important; gap: 5px !important; }
    .choices__input { color: var(--text-primary) !important; background-color: transparent !important; margin: 0 !important;}
    .choices__input::placeholder { color: #64748b; font-weight: 600; }
    .choices__list--dropdown, .choices__list[aria-expanded] { background-color: var(--bg-card) !important; border: 1px solid var(--border) !important; border-radius: 8px !important; z-index: 9999 !important; box-shadow: 0 10px 25px rgba(0,0,0,0.8) !important; overflow-y: auto !important; }
    .choices__list--dropdown::-webkit-scrollbar { width: 8px; }
    .choices__list--dropdown::-webkit-scrollbar-track { background: var(--bg-card); border-radius: 0 8px 8px 0; }
    .choices__list--dropdown::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
    .choices__list--dropdown::-webkit-scrollbar-thumb:hover { background: #64748b; }
    .choices__list--dropdown .choices__item { color: var(--text-primary) !important; font-size: 13px !important; border-bottom: 1px solid var(--border) !important; background-color: var(--bg-card) !important; }
    .choices__list--dropdown .choices__item.is-highlighted { background-color: #334155 !important; }
    .choices__list--multiple .choices__item { background-color: var(--pizzatto-red) !important; border: 1px solid var(--pizzatto-orange) !important; border-radius: 6px !important; font-size: 12px !important; font-weight: bold !important; padding: 4px 8px !important; margin: 0 !important; }
    .is-open .choices__inner, .is-focused .choices__inner { border-color: var(--pizzatto-orange) !important; box-shadow: 0 0 0 2px rgba(249, 115, 22, 0.2) !important; }

    .table-container { overflow-x: auto; background: var(--bg-card); border-radius: 12px; border: 1px solid var(--border); }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th, td { padding: 12px 15px; border-bottom: 1px solid var(--border); text-align: left; }
    th { background: #1e293b; color: #cbd5e1; font-weight: 600; text-transform: uppercase; font-size: 11px; }
    tr:hover { background: rgba(255,255,255,0.03); }
    .num { text-align: right; font-family: monospace; font-size: 14px; }
    .caro { color: var(--danger); font-weight: bold; }
    
    .badge-tipo { padding: 4px 8px; border-radius: 6px; font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; display: inline-block; margin-top: 2px;}
    .tipo-frota { background: rgba(59, 130, 246, 0.15); color: #60a5fa; border: 1px solid rgba(59, 130, 246, 0.3); }
    .tipo-agregado { background: rgba(249, 115, 22, 0.15); color: var(--pizzatto-orange); border: 1px solid rgba(249, 115, 22, 0.3); }
    .tipo-ticketlog { background: #1e293b; color: #94a3b8; border: 1px solid var(--border); }

    .grid-gerencial { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 15px; }
    .card-chart { background: var(--bg-card); padding: 25px; border-radius: 12px; border: 1px solid var(--border); }
    .card-chart h3 { font-size: 16px; margin-top: 0; color: var(--text-primary); border-bottom: 1px solid var(--border); padding-bottom: 12px; margin-bottom: 20px; display: flex; align-items: center; gap: 8px; }
    iframe { width: 100%; border: none; background: white; border-radius: 8px; }

    .intel-container { background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; padding: 30px; }
    .intel-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--border); padding-bottom: 15px; margin-bottom: 20px; }
    .intel-header h2 { font-size: 18px; margin: 0; color: var(--text-primary); font-family: 'Poppins', sans-serif;}
    .bar-bg { background: var(--bg-input); width: 100%; height: 12px; border-radius: 6px; overflow: hidden; position: relative; }
    .bar-fill { height: 100%; transition: width 0.5s ease; border-radius: 6px; }
    .fill-alta { background: var(--danger); }
    .fill-baixa { background: var(--success); }
    .fill-neutro { background: #64748b; }
    
    .regiao-card { background: var(--bg-main); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
    .regiao-titulo { background: var(--bg-input); padding: 10px 15px; font-weight: 800; font-size: 12px; text-transform: uppercase; border-bottom: 2px solid var(--border); color: var(--text-primary); }
    .uf-row { display: flex; justify-content: space-between; padding: 8px 15px; border-bottom: 1px solid var(--bg-input); font-size: 13px; font-weight: bold; }
    .uf-alta { background: rgba(239, 68, 68, 0.05); color: var(--danger); }
    .uf-baixa { background: rgba(16, 185, 129, 0.05); color: var(--success); }
    .uf-neutro { color: var(--text-secondary); }
</style>
</head>
<body>

<div id="tela-login">
    <div class="login-box">
        <div class="login-logo"><img src="logo.png?v=3" alt
