<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Painel de Abastecimentos</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { font-family: Arial; margin:20px; background:#f5f6fa; }

h1 { margin-bottom:10px; }

button { padding:8px 12px; margin-right:5px; cursor:pointer; }

.kpis { display:flex; gap:15px; margin:15px 0; }
.kpi {
    background:white;
    padding:10px;
    flex:1;
    border-radius:8px;
    box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

.filtros input, .filtros select {
    padding:6px;
    margin-right:8px;
    margin-bottom:8px;
}

table {
    width:100%;
    border-collapse:collapse;
    background:white;
}

th,td {
    border:1px solid #ddd;
    padding:6px;
}

th { background:#eee; }

td { text-align:right; }
.texto { text-align:left; }

.caro { background:#f8d7da; }
.medio { background:#fff3cd; }
.barato { background:#d4edda; }

</style>
</head>

<body>

<h1>Painel de Abastecimentos</h1>

<button onclick="mostrarAba('operacional')">Operacional</button>
<button onclick="mostrarAba('gerencial')">Gerencial</button>

<!-- ABA OPERACIONAL -->
<div id="aba-operacional">

<div class="kpis">
    <div class="kpi"><b>Total:</b> <span id="total"></span></div>
    <div class="kpi"><b>Litros:</b> <span id="litros"></span></div>
    <div class="kpi"><b>Média:</b> <span id="media"></span></div>
</div>

<div class="filtros">
    <input id="filtroPlaca" placeholder="Placa">
    <input id="filtroCidade" placeholder="Cidade">
    <input type="date" id="filtroDataInicio">
    <input type="date" id="filtroDataFim">

    <select id="filtroPosto"><option value="">Posto</option></select>
    <select id="filtroUF"><option value="">UF</option></select>
    <select id="filtroProduto"><option value="">Produto</option></select>

    <button onclick="baixarExcel()">Excel</button>
</div>

<table>
<thead>
<tr>
<th>Data</th><th>Hora</th><th>Placa</th><th>Posto</th>
<th>Cidade</th><th>UF</th><th>Produto</th>
<th>Litros</th><th>Total</th><th>Litro</th>
</tr>
</thead>
<tbody id="tabela"></tbody>
</table>

</div>

<!-- ABA GERENCIAL -->
<div id="aba-gerencial" style="display:none">

<h2>Visão Gerencial</h2>

<canvas id="grafico"></canvas>

<h3>🏆 Ranking Postos</h3>
<ul id="ranking"></ul>

<h3>🚨 Alertas</h3>
<ul id="alertas"></ul>

</div>

<script>
let dados=[];

/* FORMATOS */
const moeda=v=>Number(v||0).toLocaleString("pt-BR",{style:"currency",currency:"BRL"});
const numero=v=>Number(v||0).toLocaleString("pt-BR",{minimumFractionDigits:2});

/* LOAD */
fetch("transacoes.json")
.then(r=>r.json())
.then(j=>{
    dados=j;
    preencherFiltros();
    render(dados);
});

/* ABA */
function mostrarAba(a){
    document.getElementById("aba-operacional").style.display="none";
    document.getElementById("aba-gerencial").style.display="none";

    document.getElementById("aba-"+a).style.display="block";

    if(a==="gerencial") gerarAnalises();
}

/* FILTROS */
function preencherFiltros(){
    let postos=new Set(),ufs=new Set(),prod=new Set();

    dados.forEach(i=>{
        postos.add(i.nomeReduzidoEstabelecimento);
        ufs.add(i.uf);
        prod.add(i.tipoCombustivel);
    });

    postos.forEach(p=>filtroPosto.innerHTML+=`<option>${p}</option>`);
    ufs.forEach(u=>filtroUF.innerHTML+=`<option>${u}</option>`);
    prod.forEach(p=>filtroProduto.innerHTML+=`<option>${p}</option>`);
}

document.querySelectorAll("input,select").forEach(i=>i.addEventListener("input",filtrar));

function filtrar(){
    const f=dados.filter(i=>{
        let ok=true;

        if(filtroPlaca.value && !(i.placa||"").toLowerCase().includes(filtroPlaca.value.toLowerCase())) ok=false;
        if(filtroCidade.value && !(i.nomeCidade||"").toLowerCase().includes(filtroCidade.value.toLowerCase())) ok=false;

        if(filtroPosto.value && i.nomeReduzidoEstabelecimento!==filtroPosto.value) ok=false;
        if(filtroUF.value && i.uf!==filtroUF.value) ok=false;
        if(filtroProduto.value && i.tipoCombustivel!==filtroProduto.value) ok=false;

        if(i.dataTransacao){
            let d=i.dataTransacao.split("T")[0];
            if(filtroDataInicio.value && d<filtroDataInicio.value) ok=false;
            if(filtroDataFim.value && d>filtroDataFim.value) ok=false;
        }

        return ok;
    });

    render(f);
}

/* RENDER */
function render(lista){
    let tb=document.getElementById("tabela");
    tb.innerHTML="";

    let total=0,litros=0;

    lista.forEach(i=>{
        let dt=new Date(i.dataTransacao);
        let d=dt.toISOString().split("T")[0];
        let h=dt.toTimeString().split(" ")[0];

        let cor="";
        let vl=Number(i.valorLitro);
        if(vl>=7.5) cor="caro";
        else if(vl>=6.5) cor="medio";
        else cor="barato";

        total+=Number(i.valorTransacao||0);
        litros+=Number(i.litros||0);

        tb.innerHTML+=`
        <tr>
        <td>${d}</td>
        <td>${h}</td>
        <td class="texto">${i.placa}</td>
        <td class="texto">${i.nomeReduzidoEstabelecimento}</td>
        <td class="texto">${i.nomeCidade}</td>
        <td>${i.uf}</td>
        <td class="texto">${i.tipoCombustivel}</td>
        <td>${numero(i.litros)}</td>
        <td>${moeda(i.valorTransacao)}</td>
        <td class="${cor}">${moeda(i.valorLitro)}</td>
        </tr>`;
    });

    total.innerText;
    document.getElementById("total").innerText=moeda(total);
    document.getElementById("litros").innerText=numero(litros);
    document.getElementById("media").innerText=moeda(total/litros||0);
}

/* EXCEL */
function baixarExcel(){
    let t=document.querySelector("table").outerHTML;
    let blob=new Blob(["\ufeff",t],{type:"application/vnd.ms-excel"});
    let a=document.createElement("a");
    a.href=URL.createObjectURL(blob);
    a.download="relatorio.xls";
    a.click();
}

/* ANALISES */
function gerarAnalises(){

    let consumo={};

    dados.forEach(i=>{
        let d=i.dataTransacao.split("T")[0];
        consumo[d]=(consumo[d]||0)+Number(i.valorTransacao||0);
    });

    new Chart(document.getElementById("grafico"),{
        type:"bar",
        data:{
            labels:Object.keys(consumo),
            datasets:[{label:"Gasto por Dia",data:Object.values(consumo)}]
        }
    });

    let rank={};
    dados.forEach(i=>{
        let p=i.nomeReduzidoEstabelecimento;
        rank[p]=(rank[p]||0)+Number(i.valorTransacao||0);
    });

    ranking.innerHTML="";
    Object.entries(rank).sort((a,b)=>b[1]-a[1]).slice(0,10)
    .forEach(r=>{
        ranking.innerHTML+=`<li>${r[0]} - ${moeda(r[1])}</li>`;
    });

    alertas.innerHTML="";
    dados.forEach(i=>{
        if(Number(i.valorLitro)>7.5){
            alertas.innerHTML+=`<li>${i.nomeCidade} - ${moeda(i.valorLitro)}</li>`;
        }
    });
}
</script>

</body>
</html>
