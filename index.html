<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Painel de Abastecimentos</title>

<style>
body {
    font-family: Arial;
    padding: 20px;
}

input {
    padding: 8px;
    margin-right: 10px;
    margin-bottom: 10px;
}

button {
    padding: 8px;
    margin-bottom: 10px;
}

table {
    width: 100%;
    border-collapse: collapse;
}

th, td {
    border: 1px solid #ccc;
    padding: 8px;
}

th {
    background-color: #eee;
    cursor: pointer;
}

.alto { background-color: #ffcccc; }
.medio { background-color: #fff3cd; }
</style>
</head>

<body>

<h1>Painel de Abastecimentos</h1>

<!-- 🔎 Filtros -->
<input type="text" id="filtroPlaca" placeholder="Placa">
<input type="text" id="filtroCidade" placeholder="Cidade">

<input type="date" id="dataInicio">
<input type="date" id="dataFim">

<button onclick="baixarExcel()">📥 Baixar Excel</button>

<table id="tabela">
<thead>
<tr>
    <th onclick="ordenar('data')">Data</th>
    <th onclick="ordenar('hora')">Hora</th>
    <th>Placa</th>
    <th>Posto</th>
    <th>Cidade</th>
    <th>UF</th>
    <th>Produto</th>
    <th>Litros</th>
    <th>Valor Total</th>
    <th>Valor Unitário</th>
    <th>Cartão</th>
    <th>Tipo</th>
</tr>
</thead>
<tbody></tbody>
</table>

<script>
let dados = []
let ordemAsc = true

fetch('./transacoes.json')
.then(res => res.json())
.then(json => {
    dados = json.map(t => {

        const dataObj = new Date(t.dataTransacao)

        return {
            ...t,
            data: dataObj.toISOString().split('T')[0],
            hora: dataObj.toTimeString().split(' ')[0]
        }
    })

    renderTabela(dados)
})

// 🔹 Formatação
function moeda(v) {
    return "R$ " + Number(v).toFixed(2).replace(".", ",")
}

// 🔹 Render
function renderTabela(lista) {
    const tbody = document.querySelector("#tabela tbody")
    tbody.innerHTML = ""

    lista.forEach(t => {

        let classe = ""
        if (t.valorLitro > 7) classe = "alto"
        else if (t.valorLitro > 5) classe = "medio"

        tbody.innerHTML += `
        <tr>
            <td>${t.data}</td>
            <td>${t.hora}</td>
            <td>${t.placa}</td>
            <td>${t.nomeReduzidoEstabelecimento}</td>
            <td>${t.nomeCidade}</td>
            <td>${t.uf}</td>
            <td>${t.tipoCombustivel}</td>
            <td>${Number(t.litros).toFixed(2)}</td>
            <td>${moeda(t.valorTransacao)}</td>
            <td class="${classe}">${moeda(t.valorLitro)}</td>
            <td>${t.numeroCartao}</td>
            <td>${t.considerarTransacao}</td>
        </tr>`
    })
}

// 🔹 Filtros
document.getElementById("filtroPlaca").addEventListener("input", aplicarFiltros)
document.getElementById("filtroCidade").addEventListener("input", aplicarFiltros)
document.getElementById("dataInicio").addEventListener("change", aplicarFiltros)
document.getElementById("dataFim").addEventListener("change", aplicarFiltros)

function aplicarFiltros() {

    const placa = document.getElementById("filtroPlaca").value.toLowerCase()
    const cidade = document.getElementById("filtroCidade").value.toLowerCase()
    const inicio = document.getElementById("dataInicio").value
    const fim = document.getElementById("dataFim").value

    const filtrado = dados.filter(t => {

        const dentroData =
            (!inicio || t.data >= inicio) &&
            (!fim || t.data <= fim)

        return (
            dentroData &&
            (!placa || t.placa.toLowerCase().includes(placa)) &&
            (!cidade || t.nomeCidade.toLowerCase().includes(cidade))
        )
    })

    renderTabela(filtrado)
}

// 🔹 Ordenação
function ordenar(campo) {
    ordemAsc = !ordemAsc

    dados.sort((a, b) => {
        if (a[campo] < b[campo]) return ordemAsc ? -1 : 1
        if (a[campo] > b[campo]) return ordemAsc ? 1 : -1
        return 0
    })

    aplicarFiltros()
}

// 🔹 Exportar
function baixarExcel() {

    const linhas = [["Data","Hora","Placa","Posto","Cidade","UF","Produto","Litros","Valor Total","Valor Unitário","Cartão","Tipo"]]

    const placa = document.getElementById("filtroPlaca").value.toLowerCase()
    const cidade = document.getElementById("filtroCidade").value.toLowerCase()
    const inicio = document.getElementById("dataInicio").value
    const fim = document.getElementById("dataFim").value

    const filtrado = dados.filter(t => {

        const dentroData =
            (!inicio || t.data >= inicio) &&
            (!fim || t.data <= fim)

        return (
            dentroData &&
            (!placa || t.placa.toLowerCase().includes(placa)) &&
            (!cidade || t.nomeCidade.toLowerCase().includes(cidade))
        )
    })

    filtrado.forEach(t => {
        linhas.push([
            t.data,
            t.hora,
            t.placa,
            t.nomeReduzidoEstabelecimento,
            t.nomeCidade,
            t.uf,
            t.tipoCombustivel,
            t.litros,
            t.valorTransacao,
            t.valorLitro,
            t.numeroCartao,
            t.considerarTransacao
        ])
    })

    let csv = "data:text/csv;charset=utf-8," +
        linhas.map(e => e.join(";")).join("\n")

    const link = document.createElement("a")
    link.href = encodeURI(csv)
    link.download = "abastecimentos.csv"
    link.click()
}
</script>

</body>
</html>
